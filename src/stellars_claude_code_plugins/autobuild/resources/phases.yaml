# ──────────────────────────────────────────────────────────────────
# phases.yaml - Phase definitions with start/execution/end lifecycle
# ──────────────────────────────────────────────────────────────────
#
# PURPOSE: Single source of truth for all phase templates, agent
# definitions, and gate prompts. Every WORKFLOW::PHASE declares its
# own readback and gatekeeper agents inline. No separate agents.yaml.
#
# NAMING: Phase keys use FQN WORKFLOW::PHASE for workflow-specific
# phases and bare PHASE for shared phases. There is NO fallback
# chain - every reference must resolve exactly or fail.
#
# STRUCTURE PER PHASE:
#   auto_actions  - actions to run on phase completion
#   auto_verify   - run make test/lint automatically on end
#   reject_to     - backward transition target on failure
#   start         - phase entry:
#     template    - instruction text with {variable} placeholders
#     agents      - readback agent(s) that validate understanding
#   execution     - work phase (omitted when phase has no work agents):
#     agents      - work agents spawned in parallel
#   end           - phase exit:
#     template    - exit criteria text with {variable} placeholders
#     agents      - gatekeeper agent(s) that validate completion
#
# SHARED GATES: Skip-related gates (gatekeeper_skip, gatekeeper_force_skip)
# are in shared_gates section under skip. They evaluate skip
# decisions, not phase-specific work, so they apply to any phase.
#
# AGENT FIELDS:
#   name          - identifier used in --agents CLI flag
#   display_name  - heading label (### Agent N: DISPLAY_NAME)
#   prompt        - per-phase instructions
#   mode          - execution mode (omit for default parallel via Agent tool)
#                   standalone_session = runs via `claude -p` subprocess
#   checklist     - optional quality gate checklist appended to prompt
#
# TEMPLATE VARIABLES:
#   {objective}, {iteration}, {iteration_purpose}, {prior_context},
#   {plan_context}, {prior_hyp}, {CMD}, {checklist}, {benchmark_info},
#   {remaining}, {total}, {agents_instructions}, {spawn_instruction},
#   {spawn_instruction_plan}, {phase}, {understanding}, {exit_criteria},
#   {required_agents}, {recorded_agents}, {output_status},
#   {readback_status}, {evidence}, {reason}, {description},
#   {benchmark_configured}, {completed_phases}, {phase_purpose}
# ──────────────────────────────────────────────────────────────────

# ── Shared directives ─────────────────────────────────────────────

occam_directive: &occam_directive |
  **Occam's Razor**: Guard against unnecessary complexity in every design decision:
  - Can this be achieved without adding a new file? One canonical location per data entity.
  - Can this field live in an existing structure? No shadow copies, no parallel tracking.
  - Does this need a separate tracking mechanism? No orphan files, no redundant structures.
  Reject designs that introduce speculative abstractions or file proliferation.

context_acknowledgment_directive: &context_acknowledgment_directive |
  **Context Acknowledgment**: When context messages are active for this phase,
  each agent MUST write a rich acknowledgment note for each context entry:
  `{CMD} context --note <identifier> --message "Action: <what was done>. Referenced by: <agents>. Impact: <how it affected this phase>."`
  Do NOT leave context entries with just "seen by" notes.

# ── Actions ────────────────────────────────────────────────────────
# Named actions referenced by auto_actions. Each action uses FQN
# ACTION::NAME with cli_name for auto_actions references.

actions:
  ACTION::PLAN_SAVE:
    cli_name: plan_save
    type: programmatic
    description: "Save PLAN output to plan.yaml for dependency workflows"
  ACTION::ITERATION_SUMMARY:
    cli_name: iteration_summary
    type: programmatic
    description: "Write iteration_N.md executive summary from phase outputs"
  ACTION::ITERATION_ADVANCE:
    cli_name: iteration_advance
    type: programmatic
    description: "Advance to next iteration, reset phase state"
  ACTION::HYPOTHESIS_AUTOWRITE:
    cli_name: hypothesis_autowrite
    type: generative
    description: "Extract structured hypotheses from phase output"
    prompt: |
      Read the phase output below and extract structured hypotheses.
      Write to {artifacts_dir}/hypotheses.yaml as identifier-keyed YAML dict.
      Each entry: hypothesis, prediction, evidence, stars, status, iteration_created, notes.
      New hypotheses: status "new", notes [].
      Notes format: list of dicts [{{status: "message"}}], NOT plain strings.
      Valid statuses: new, dismissed, processed, deferred.
      Selected hypotheses should use status "processed", NOT "selected".
      APPEND new entries. UPDATE existing by identifier. Do NOT remove existing.

      Phase output:
      {phase_output}
  ACTION::HYPOTHESIS_GC:
    cli_name: hypothesis_gc
    type: generative
    description: "Archive dismissed hypotheses to archive file"
    prompt: |
      Read {artifacts_dir}/hypotheses.yaml. Move entries with status "dismissed"
      to {artifacts_dir}/hypotheses_archive.yaml. Keep "new", "deferred", "processed" in main file.

# ── Shared skip gates ─────────────────────────────────────────────
# Skip decisions are not phase-specific - they evaluate whether
# skipping any phase is justified. Shared across all workflows.

shared_gates:
  skip:
    gatekeeper_skip:
      mode: standalone_session
      description: "Evaluates whether skipping an optional phase is justified"
      prompt: |
        Reply with ONLY APPROVE or DENY followed by a one-line reason.
        Do NOT use any tools.

        An AI agent wants to SKIP phase {phase} in iteration
        {iteration} ({itype}).
        OBJECTIVE: {objective}
        PHASE PURPOSE: {phase_purpose}
        SKIP REASON: {reason}

        Is skipping justified? A skip is OK if:
        - The phase work was already done in a prior step
        - The phase is genuinely not applicable to this iteration's scope
        - The changes are trivially small and the phase would add no value
        A skip is NOT OK if:
        - The agent is cutting corners to save time
        - The phase would catch issues the agent might miss
        - Required agents would provide independent validation

    gatekeeper_force_skip:
      mode: standalone_session
      description: "Very conservative evaluation for force-skipping required phases"
      prompt: |
        Reply with ONLY APPROVE or DENY followed by a one-line reason.
        Do NOT use any tools.

        An AI agent wants to FORCE-SKIP a REQUIRED phase.
        PHASE: {phase} (REQUIRED - normally cannot be skipped)
        ITERATION: {iteration}
        COMPLETED PHASES: {completed_phases}
        SKIP REASON: {reason}

        Be VERY CONSERVATIVE. A force-skip is exceptional.
        ONLY approve if:
        - The iteration is stopping early and remaining phases are truly meaningless
        - The phase's purpose was already fulfilled by a prior step
        - An external constraint makes execution impossible
        DENY if:
        - The agent is cutting corners or saving time
        - The phase provides independent validation that hasn't occurred
        - Skipping would reduce quality assurance
        - The reason is vague or doesn't explain why the phase is unnecessary
        Default to DENY unless the reason is compelling.

# ── FULL::RESEARCH ─────────────────────────────────────────────────

FULL::RESEARCH:
  auto_actions:
    on_complete: []
  start:
    template: |
      ## Phase: RESEARCH

      **Objective**: {objective}
      **Iteration**: {iteration}
      {iteration_purpose}
      {prior_context}{plan_context}
      **Your role: Research Manager.** You own quality of this phase's output.
      Three specialist agents work for you. Dispatch them, synthesize findings
      into cohesive research document, ensure rich enough that HYPOTHESIS,
      PLAN, IMPLEMENT can do their jobs without re-reading codebase.

      If agents bring back shallow findings, send them back. If gaps exist
      between agent findings and downstream phase needs, fill them yourself
      or dispatch agents again. Research document you produce is foundation
      for ALL subsequent work - if thin, everything downstream will be thin.

      **Dispatch** 3 specialist agents:

      {spawn_instruction}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.

      {agents_instructions}

      **CRITICAL: This phase is READ-ONLY.** Do NOT modify any project files.
      Do NOT use Edit, Write, or any tool that changes files. Only gather information.

      **Investigate unsolved failures**: If prior failures exist with unsolved status,
      investigate them as root causes. Each unsolved failure is investigation target.

      **Synthesize**: After all 3 agents return, synthesize findings into single
      document with these MANDATORY sections:
      1. **Current State Summary**: what exists, what works, key metrics (line counts, test counts, file counts)
      2. **Gap Analysis**: what's missing vs what objective requires, with specific file/function references
      3. **File Inventory**: list of relevant files with purpose and line counts
      4. **Risk Assessment**: what could go wrong, dependencies, complexity concerns

      Cross-reference agent findings. Resolve contradictions. Fill gaps where one agent
      found something relevant to another's area. Add own findings if agents missed
      something obvious.

      **Quality gate** - before calling end, verify synthesized output passes:
      - [ ] **Hypothesis readiness**: root causes identified (not symptoms). Testable hypotheses can be formed from this alone
      - [ ] **Plan readiness**: specific files, functions, line numbers documented. Planner can identify changes without re-reading code
      - [ ] **Implementation readiness**: function signatures, patterns, dependencies mapped. Implementer can write code from this
      - [ ] **Gap check**: no unanswered questions that would force downstream phases to guess

      If ANY criterion fails: dispatch agents again to fill gaps, or investigate yourself.

      **AFTER checklist passes**, write final findings to a file, then:
      ```
      {CMD} end --evidence "summary of what was researched" --agents "researcher,architect,product_manager" --output-file "{phase_dir}/research.md"
      ```

      **Output**: research findings document sufficient for hypothesis generation, planning, and implementation.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: spawning 3 separate agents AND read-only constraint.
          Be lenient on phrasing.
  execution:
    agents:
      - name: researcher
        display_name: RESEARCHER
        prompt: |
          Deep-dives into code, prior results, history. For EACH finding, produce:
          - **FINDING**: what you discovered (1-2 sentences)
          - **EVIDENCE**: specific file:line references, metrics, test output
          - **IMPACT**: why this matters for objective
          - **FILES**: specific file paths involved

          Tasks:
          - Read files most relevant to objective - cite line numbers
          - Read recent git log, benchmark reports, failure logs
          - What was tried before? What worked? What failed and why?
          - Find existing functions, patterns, tests that relate to objective
          - Count things: lines of code, test count, function count, file count

          Minimum: 5 structured findings with code references. "X is missing" without
          file path is NOT a finding.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: architect
        display_name: ARCHITECT
        prompt: |
          Analyses system design and technical landscape. For EACH finding, produce:
          - **FINDING**: what you discovered about architecture
          - **EVIDENCE**: specific file:line references, dependency chains, patterns found
          - **IMPACT**: why this matters for objective
          - **FILES**: specific file paths involved

          Tasks:
          - Understand current architecture and how objective fits
          - Map dependencies: what connects to what, what breaks if we change X
          - Find existing patterns that should be reused vs areas that need redesign
          - Assess technical feasibility and complexity
          - Identify simplest approach: what's minimum change that achieves objective?

          *occam_directive

          Minimum: 3 structured findings with architectural analysis.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: product_manager
        display_name: PRODUCT MANAGER
        prompt: |
          Clarifies requirements and acceptance criteria. For EACH finding, produce:
          - **FINDING**: what requirement actually is (not what you assume)
          - **EVIDENCE**: specific text from objective documents, specs, user requests
          - **IMPACT**: priority (must-have vs nice-to-have) with reasoning
          - **FILES**: specific documents or code that defines requirement

          Tasks:
          - Read ALL objective documents referenced in objective (PROGRAM.md, specs, checklists)
          - What exactly needs to be achieved? Quote acceptance criteria verbatim
          - Prioritise: what's must-have vs nice-to-have for THIS iteration?
          - Identify measurable success metrics - how will we know each item is done?
          - What's gap between current state and desired state? Quantify it

          Minimum: 3 structured findings with specific acceptance criteria.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
  end:
    template: |
      ## Phase: RESEARCH (exit criteria)

      **Verify ALL**:
      - [ ] THREE separate agents spawned (researcher, architect, product_manager)
      - [ ] Merged output self-evaluated against downstream readiness checklist
      - [ ] Agents provided on end: `--agents "researcher,architect,product_manager"`
      - [ ] Research findings written to file and provided via `--output-file`
      - [ ] Specific files read with line numbers cited in findings
      - [ ] Concrete findings documented (not "read the code" - actual observations)
      - [ ] Evidence with metrics or counts where applicable
      - [ ] Reasoning provided for why each finding matters (not just facts)
      - [ ] Items categorised by status: done, needs work, blocked, deferred
      - [ ] Prior iteration results reviewed (what worked, what didn't)
      - [ ] Acceptance criteria from objective documents understood

      **BLOCKING**: phase cannot complete without --agents and --output-file on end.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          AGENTS: required={required_agents} | recorded={recorded_agents}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: 3 agents spawned separately. Downstream readiness checklist evaluated.
          STRUCTURAL CHECKS (all must be present in output):
          - Current State Summary section with specific metrics
          - Gap Analysis section with file/function references
          - File Inventory with paths
          - Risk Assessment
          - Each finding has EVIDENCE with code references (not just descriptions)
          FAIL if ANY structural section is missing. FAIL if findings lack code references.
          Vague summaries like "X is missing" without file paths or line numbers = FAIL.
          IF context messages are active, evidence SHOULD reference or acknowledge them.

# ── FULL::HYPOTHESIS ───────────────────────────────────────────────

FULL::HYPOTHESIS:
  auto_actions:
    on_complete: [hypothesis_gc]
  start:
    template: |
      ## Phase: HYPOTHESIS

      **Objective**: {objective}
      **Iteration**: {iteration}
      {iteration_purpose}
      {prior_hyp}
      **CRITICAL: This phase is READ-ONLY.** Do NOT modify any project files.
      Do NOT use Edit, Write, or any tool that changes files.
      Show your reasoning for each decision and finding.

      **Goal**: review, refine, evolve hypothesis backlog informed by RESEARCH findings.
      Four agents with different perspectives each review EXISTING hypothesis list,
      propose additions, flag removals, suggest re-ordering.

      {spawn_instruction}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.
      Give each agent: (1) research findings, (2) prior hypothesis list shown above.

      Each agent MUST:
      1. **Rate** each existing hypothesis with stars (1-5): how valuable from this perspective?
      2. **Review** each - still valid? Already addressed? Obsolete?
      3. **Propose** 1-3 new hypotheses from their perspective
      4. **Flag** any existing hypotheses for removal (with reason)
      5. **Return** re-ordered list: most important first, with star ratings

      {agents_instructions}

      ### Merging hypotheses

      After all 4 agents return, merge their proposals:
      1. Compile full hypothesis list (existing + new proposals)
      2. Remove hypotheses flagged by 2+ agents
      3. Average star ratings across agents (total stars / 4 agents = hypothesis score)
      4. Rank by star average (highest first), break ties by: evidence x impact x risk
      5. Select top 1-3 for THIS iteration
      6. Write each hypothesis as RICH, self-contained description that anyone can understand
         without context. Include: what problem is, why it exists (root cause), what
         specifically to change (files, functions), what measurable outcome to expect, and
         what could go wrong. Format:
         ```
         ID: H0NN
         HYPOTHESIS: 2-3 sentence problem statement with root cause analysis
         WHAT TO DO: specific files and functions to modify, concrete changes
         PREDICT: measurable outcome (metric from X to Y, or count from N to M)
         EVIDENCE: data points, benchmark scores, code references supporting this
         RISK: what could break, regressions to watch, complexity concerns
         STARS: avg/5 (contrarian: N, optimist: N, pessimist: N, scientist: N)
         ```

      **AFTER all agents return**, write merged hypotheses to a file, then:
      ```
      {CMD} end --evidence "summary of hypothesis debate" --agents "contrarian,optimist,pessimist,scientist" --output-file "{phase_dir}/hypotheses.md"
      ```

      **Output**: updated, ranked hypothesis backlog with top 1-3 selected for PLAN phase.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: 4 separate agents AND hypothesis ranking process.
          Be lenient on phrasing.
  execution:
    agents:
      - name: contrarian
        display_name: CONTRARIAN
        prompt: |
          "What if the obvious approach is wrong? What are we NOT seeing?"
          - Challenges assumptions in existing hypotheses
          - Proposes hypotheses that question the premise
          - Flags hypotheses that chase symptoms instead of root causes

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: optimist
        display_name: OPTIMIST
        prompt: |
          "What's the highest-impact change we could make?"
          - Proposes hypotheses targeting the biggest wins
          - Focuses on leverage points where small changes have large effects
          - Flags hypotheses with low expected impact for removal

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: pessimist
        display_name: PESSIMIST
        prompt: |
          "What could go wrong? What will we break?"
          - Proposes hypotheses about risks and regressions
          - Flags hypotheses that are too risky or too complex
          - Warns about hypotheses that sound good but will fail in practice

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: scientist
        display_name: SCIENTIST
        prompt: |
          "What can we measure? What's the evidence?"
          - Proposes hypotheses with clear, measurable predictions
          - Flags hypotheses that cannot be tested or measured
          - Demands: current metric -> target metric for every hypothesis

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
  end:
    template: |
      ## Phase: HYPOTHESIS (exit criteria)

      **BEFORE calling end**: Write hypotheses to TWO locations:
      1. `{artifacts_dir}/hypotheses.yaml` - the PERSISTENT catalogue (survives across iterations, read by `_load_hypotheses`)
      2. `{phase_dir}/hypotheses.md` - the phase output file (passed via `--output-file`)

      **IMPORTANT**: `{artifacts_dir}` and `{phase_dir}` are DIFFERENT directories. The .yaml goes to artifacts root, the .md goes to the phase subfolder.

      Format for hypotheses.yaml: identifier-keyed YAML dict.
      Each entry must have: hypothesis, prediction, evidence, stars (int 1-5), status (new/dismissed/processed/deferred), iteration_created, notes (list of dicts).
      Selected hypotheses: status "processed". Rejected: status "dismissed" with note.

      **Verify ALL**:
      - [ ] FOUR separate agents spawned (contrarian, optimist, pessimist, scientist)
      - [ ] Agents provided on end: `--agents "contrarian,optimist,pessimist,scientist"`
      - [ ] Each agent received research findings as context
      - [ ] Hypotheses merged, ranked, written to file and provided via `--output-file`
      - [ ] Top 1-3 selected with predictions and evidence
      - [ ] Each hypothesis has a measurable prediction (from X to Y)

      **BLOCKING**: phase cannot complete without --agents and --output-file on end.

      **HYPOTHESIS GC**: runs automatically after gatekeeper passes.
      Archives DONE and REMOVED hypotheses to `hypotheses_archive.yaml`.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          AGENTS: required={required_agents} | recorded={recorded_agents}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: 4 agents spawned separately, hypotheses merged with star ratings.
          FORMAT CHECK per selected hypothesis (ALL fields required):
          - ID: identifier present
          - HYPOTHESIS: 2-3 sentence problem statement with root cause
          - WHAT TO DO: specific files and functions to modify
          - PREDICT: measurable outcome (metric from X to Y)
          - EVIDENCE: data points, benchmark scores, code references
          - RISK: regressions, complexity concerns
          - STARS: averaged rating with per-agent breakdown
          FAIL if ANY selected hypothesis is missing ANY required field.
          Also check: notes are in dict format [{{status: "message"}}], not plain strings.
          Status must be one of: new, dismissed, processed, deferred (NOT "selected").
          IF context messages are active, evidence SHOULD reference or acknowledge them.

# ── PLAN (shared) ──────────────────────────────────────────────────
# Default implementation planning phase used by FULL, FAST workflows.
# GC has its own GC::PLAN, PLANNING has PLANNING::PLAN.

PLAN:
  auto_actions:
    on_complete: []
  start:
    template: |
      ## Phase: PLAN

      **Objective**: {objective}
      **Iteration**: {iteration}
      {prior_context}

      **CRITICAL: NO CODE EDITS IN THIS PHASE.** Planning is READ-ONLY.
      Do NOT use Edit, Write, or any tool that modifies files (except the plan output file).

      **Plan MUST be grounded in hypotheses from HYPOTHESIS phase.**
      Each selected hypothesis should map to specific plan items with files, changes, acceptance criteria.
      If no hypotheses exist, plan must explain its own reasoning from scratch.

      Before creating final plan, explore 2-3 alternative approaches to decomposing work.
      Have contrarian agent challenge each approach. Select best with justification.

      **Execution** (MANDATORY - explore -> design -> review -> write):
      1. **Explore**: Read context (git log, failure log `{CMD} failures`, prior results). Spawn **Explore agents** (up to 3 in parallel) to investigate codebase
      2. **Design**: Based on exploration results, design implementation approach with specific files, changes, acceptance criteria
      3. **Review**: Spawn review agents (architect, critic, guardian) to challenge plan
      4. **Write**: Write final plan to file for `--output-file`

      **Plan must contain**:
      - What specifically needs to change and why (root causes)
      - Hypotheses with predictions (from X to Y)
      - Specific files and functions to modify
      - Acceptance criteria for each change
      - Risk assessment and planned impact

      **Why agents**: planning quality depends on SEEING code, not guessing.
      Explore agents search broadly and return findings. Without them, plans are
      shallow and miss existing code that could be reused.

      **Output**: plan file with hypotheses, predictions, and file paths.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: planning AND read-only.
          Be lenient on phrasing.
  execution:
    agents:
      - name: architect
        display_name: ARCHITECT
        prompt: |
          Reviews plan for technical feasibility and design quality:
          - Is plan specific enough to verify after implementation?
          - Are right files identified? Are dependencies missed?
          - Is approach simplest that could work?
          - Are existing functions/patterns that should be reused instead of reinventing?
          - Could proposed changes introduce regressions?
          If plan is vague ("improve code quality"), REJECT it.

          **Occam's Razor**: Guard against unnecessary complexity. One canonical location per data entity. No shadow copies, no parallel tracking files, no orphan structures. Challenge: can this be achieved without adding a new file? Can this field live in an existing structure? Reject speculative abstractions.

          **Clarity**: Designs should be immediately understandable. Naming reveals intent, structure reveals relationships. If a design requires explanation, it is too complex.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: critic
        display_name: CRITIC
        prompt: |
          Reviews plan for quality and completeness:
          - Is plan specific enough to verify after implementation?
          - Are there gaps - things hypotheses demand but plan doesn't address?
          - Is scope right - not too large (won't finish), not too small (won't matter)?
          - Does plan address ROOT CAUSE or just symptom?
          If plan is vague ("improve code quality"), REJECT it.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: guardian
        display_name: GUARDIAN
        prompt: |
          Reviews plan for overfit risk. READ THE ACTUAL CODE to verify claims.
          Do not trust evidence text alone - use Read, Grep, Glob to check files.
          Guardian is quality gate
          that prevents changes from gaming tests, benchmarks, or scenarios
          instead of genuinely improving system. Apply checklist below
          to every proposed change. If uncertain whether change is overfit
          or intentional specialisation, ASK user - never silently approve.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
        checklist: &guardian_checklist |
          GUARDIAN CHECKLIST (apply ALL):
          1. TEST OVERFITTING: do changes game specific test assertions rather than
             fixing underlying behaviour?
             - BAD: `if input == test_value: return expected` (hardcoded for test)
             - BAD: relaxing assertion threshold just to make it pass
             - BAD: adding mocks that hide real integration issues
             - GOOD: fixing the algorithm so the test passes naturally

          2. BENCHMARK OVERFITTING: do changes target specific benchmark scenarios
             rather than improving general capability?
             - BAD: "use font-size 9" (games a size>=10 evaluator check)
             - BAD: type-specific templates (`if type == X then...`)
             - BAD: hardcoded thresholds matching benchmark data
             - GOOD: design-intent rules that work for any input

          3. SCENARIO OVERFITTING: do changes assume a specific dataset, document,
             or use case that won't generalise?
             - BAD: hardcoded paths, filenames, content specific to one dataset
             - BAD: logic that only works for the test/demo scenario
             - GOOD: parameterised, configurable, works with any input

          4. INTENTIONAL SPECIALISATION: if something LOOKS like overfitting but
             was explicitly requested by the user, it is OK. The guardian MUST ASK:
             "This change targets a specific scenario: {description}.
              Was this intentional? If yes, proceed. If no, reject."
             Use AskUserQuestion if uncertain. Never silently allow suspected overfit.

          5. CONTEXT AUDIT: are context acknowledgment notes substantive?
             - BAD: "seen by REVIEW" (no action, no impact described)
             - GOOD: "Considered in PLAN phase. Routing concern incorporated into iteration scope. Referenced by architect and critic agents."
             If acknowledgment notes are shallow, WARN.

          VERDICTS: CLEAN / WARN (log) / BLOCK (reject) / ASK (ask user)
  end:
    template: |
      ## Phase: PLAN (exit criteria)

      **Verify ALL before proceeding**:
      - [ ] Context reviewed (prior results, current state)
      - [ ] Targets identified with root causes
      - [ ] Predictions written down (quantitative where possible)
      - [ ] Plan documented

      **Plan depth validation** - the plan MUST contain:
      - [ ] **Specific files** to modify (not just "update the module")
      - [ ] **Concrete changes** per file (not just "improve X" - what exactly changes?)
      - [ ] **Root cause** identified for each target (why does this problem exist?)
      - [ ] **Acceptance criteria** that can be verified after implementation
      - [ ] **Risk assessment** - what could go wrong, what regressions to watch for
      - [ ] **Planned impact** - what measurable outcome does each change produce? (benchmark score delta, test coverage, error reduction)
      - [ ] **Dependencies** between changes (ordering constraints)
      If any of these are missing or vague, the plan is NOT deep enough. Revise before spawning reviewers.

      {spawn_instruction_plan}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.

      After agents return, write merged review to a file, then:
      ```
      {CMD} end --evidence "plan reviewed by 3 agents" --agents "architect,critic,guardian" --output-file "{phase_dir}/plan.md"
      ```

      {agents_instructions}

      If any agent flags issues, revise the plan before proceeding.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          AGENTS: required={required_agents} | recorded={recorded_agents}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}

          PLAN QUALITY CHECKLIST (ALL must pass):
          - Plan names specific files to modify (not "update the module")
          - Each change has root cause identified (why this problem exists)
          - Each change has acceptance criteria (verifiable after implementation)
          - Risk assessment present (what could go wrong, regressions to watch)
          - Predictions with metrics (from X to Y, or count from N to M)
          - 2-3 alternative approaches explored, best selected with justification
          - Review agents (architect, critic, guardian) challenged the plan
          FAIL if ANY item is missing or vague. "Improve code quality" is not a plan.
          IF context messages are active, evidence MUST reference or acknowledge them.

# ── IMPLEMENT (shared) ────────────────────────────────────────────────

IMPLEMENT:
  auto_actions:
    on_complete: []
  start:
    template: |
      ## Phase: IMPLEMENT

      **Do NOT evaluate benchmark.** Write code only. Benchmark evaluation
      happens in TEST phase.

      **Goal**: make code changes with internal hypothesis loop.

      **Per change**:
      1. PREDICT: what will change in output?
      2. IMPLEMENT: make change
      3. VERIFY: does output match prediction? If not: diagnose, retry
      4. REFLECT: ROOT_CAUSE_FIXED / PARTIAL / WRONG / NEW_DEFECT

      **Spawn worker agents** for multi-file changes (use Agent tool):
      - Each agent gets DISJOINT file ownership (no two agents edit same file)
      - Each agent gets: files to modify, acceptance criteria from plan, predict/verify loop
      - Launch agents IN PARALLEL when file sets don't overlap
      - Agent results merged by orchestrating session

      **Single-file changes**: make directly, no agent needed.

      **Rules**:
      - Follow plan from PLAN phase - don't add features beyond what was planned
      - Don't "improve" unrelated code (scope creep)
      - Each change must have predict/verify reflection

      **Context & Failure Acknowledgment**: When context messages or failures are active,
      each agent MUST write a rich acknowledgment note:
      - Context: `{CMD} context --note <id> --message "Action: <what was done>. Referenced by: <agents>. Impact: <how>."`
      - Failures: investigate each failure and note findings
      Do NOT leave entries with shallow "seen by" notes.

      **WHEN DONE**: write summary of changes to a file, then:
      ```
      {CMD} end --evidence "implemented N changes per plan" --output-file "{phase_dir}/impl.md"
      ```

      **Output**: code changes ready for testing.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: predict/verify loop AND following the plan.
          Be lenient on phrasing.
  end:
    template: |
      ## Phase: IMPLEMENT (exit criteria)

      **Verify ALL**:
      - [ ] Changes match the plan (nothing extra, nothing missing)
      - [ ] Each change has predict/verify reflection
      - [ ] No unrelated modifications introduced

      **Critic question**: do the changes match the stated plan, or did scope creep occur?

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: changes match plan (no scope creep), predict/verify
          reflection documented for each change.
          Evaluate implementation THOROUGHNESS: each change must show what was predicted vs what happened. Missing reflections = FAIL.
          IF context messages are active, evidence MUST reference or acknowledge them.

# ── TEST (shared) ─────────────────────────────────────────────────────

TEST:
  auto_actions:
    on_complete: []
  auto_verify: true
  reject_to:
    phase: IMPLEMENT
    condition: "test failure requires fixing implementation"
  start:
    template: |
      ## Phase: TEST

      **CRITICAL: This phase is READ-ONLY.** Do NOT modify any project files.
      Do NOT use Edit, Write, or any tool that changes files.

      **This is where benchmark evaluation happens.** Benchmark instruction below
      is for YOU to follow. Read referenced file, evaluate each item, update
      checkmarks, report violation count.

      **Goal**: automated verification. Tests, lint, benchmark MUST pass.

      **Actions** (orchestrator runs these automatically on `end`):
      1. `make test` - all tests pass
      2. `make lint` - no lint errors
      3. Benchmark (if configured) - runs and records score
      {benchmark_info}

      If tests fail: auto-reject back to IMPLEMENT. Do not proceed with failing tests.
      Benchmark failure NOT blocking (score tracked, not gated).

      **Log failures**: if you find failure modes during testing, log them:
      ```
      {CMD} log-failure --mode "FM-NAME" --desc "description"
      ```

      **Context & Failure Acknowledgment**: When context messages or failures are active,
      each agent MUST write a rich acknowledgment note:
      - Context: `{CMD} context --note <id> --message "Action: <what was done>. Referenced by: <agents>. Impact: <how>."`
      - Failures: investigate each failure and note findings
      Do NOT leave entries with shallow "seen by" notes.

      **WHEN DONE**:
      ```
      {CMD} end --evidence "tests pass, lint clean, benchmark score: N"
      ```

      **Output**: green tests, clean lint, benchmark score (if configured).

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: running tests AND benchmark evaluation (if applicable).
          Be lenient on phrasing.
  execution:
    agents:
      - name: benchmark_evaluator
        display_name: BENCHMARK EVALUATOR
        prompt: |
          Evaluate project benchmark and update score tracking:
          1. Read BENCHMARK.md from project root
          2. For each checklist item, evaluate whether satisfied
          3. Check item if satisfied, uncheck if not - edit BENCHMARK.md directly
          4. Count unchecked items and compute benchmark score
          5. Update Score Tracking table at bottom of BENCHMARK.md
             with current iteration results (iteration number, score, summary)
          6. Report final score as your output

          **IMPORTANT**: You MUST edit BENCHMARK.md - reading without editing = failure.
          Benchmark score formula defined in BENCHMARK.md itself.
  end:
    template: |
      ## Phase: TEST (exit criteria)

      **Automated checks** (ran by orchestrator):
      - [ ] `make test` passes with 0 failures
      - [ ] `make lint` passes clean
      - [ ] If benchmark configured: BENCHMARK.md file EDITED with [x]/[ ] marks
      - [ ] If benchmark configured: Score Tracking table UPDATED with this iteration's results
      - [ ] Evidence contains specific score numbers (not just "benchmark evaluated")

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          READBACK: {readback_status}
          BENCHMARK CONFIGURED: {benchmark_configured}
          EVIDENCE: {evidence}
          Check: tests pass, lint clean.
          BENCHMARK RULE: if benchmark is configured (shows "yes"):
          1. Evidence MUST contain specific score numbers (e.g., "score: 17", "unchecked: 5")
          2. Evidence MUST confirm BENCHMARK.md file was EDITED (not just read)
          3. Evidence MUST confirm Score Tracking table was UPDATED with iteration results
          4. A claim like "benchmark evaluated" without numbers or file edit = FAIL
          5. FAIL message: "benchmark configured but Score Tracking not updated"
          If benchmark shows "no", ignore benchmark checks.
          Evaluate test COMPLETENESS: all planned changes must be covered by test results.

# ── REVIEW (shared) ───────────────────────────────────────────────────

REVIEW:
  auto_actions:
    on_complete: []
  reject_to:
    phase: IMPLEMENT
    condition: "reviewer rejects implementation back to IMPLEMENT"
  start:
    template: |
      ## Phase: REVIEW

      **CRITICAL: This phase is READ-ONLY.** Do NOT modify any project files.
      Do NOT use Edit, Write, or any tool that changes files.
      Show your reasoning for each decision and finding.
      **Do NOT re-evaluate benchmark.** Review code and benchmark results only.

      **Goal**: four agents review work IN PARALLEL. This is NOT rubber stamp.

      **Context & Failure Acknowledgment**: When context messages or failures are active,
      each agent MUST write a rich acknowledgment note:
      - Context: `{CMD} context --note <id> --message "Action: <what was done>. Referenced by: <agents>. Impact: <how>."`
      - Failures: investigate each failure and note findings
      Do NOT leave entries with shallow "seen by" notes.

      {spawn_instruction}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.

      {agents_instructions}

      ### Merging verdicts

      All four agents return their findings. Merge:
      - All APPROVE -> proceed to RECORD
      - Any has issues -> REJECT with combined feedback:
        ```
        {CMD} reject --reason "critic: X; architect: Y; guardian: Z; forensicist: W"
        ```
      - Guardian says ASK -> ask user before proceeding (use AskUserQuestion)

      **AFTER all agents return**, write merged verdicts to a file, then:
      ```
      {CMD} end --evidence "4 agents reviewed, all approve" --agents "critic,architect,guardian,forensicist" --output-file "{phase_dir}/review.md"
      ```

      **Output**: merged verdict from all four agents + forensicist's failure analysis for next iteration.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: 4 separate agents AND independent review.
          Be lenient on phrasing.
  execution:
    agents:
      - name: critic
        display_name: CRITIC
        prompt: |
          Checks implementation quality and plan alignment:
          1. **Plan alignment**: do changes match PLAN? Any scope creep?
          2. **Quality**: are changes clean, minimal, correct?
          3. **Regressions**: could these changes break anything not covered by tests?
          4. **Completeness**: is anything from plan left undone?

          Critic must be SPECIFIC: "code quality is poor" is not actionable.
          "Function X at line Y duplicates logic from Z" is actionable.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: architect
        display_name: ARCHITECT
        prompt: |
          Checks architectural soundness of implementation:
          1. **Design fit**: do changes fit existing architecture or fight against it?
          2. **Abstraction level**: right level of abstraction? No premature generalisation?
          3. **Dependencies**: are new dependencies justified? Any circular references introduced?
          4. **Patterns**: do changes follow established project patterns or diverge without reason?
          5. **Simplicity**: is this simplest approach that could work?

          **Occam's Razor**: Guard against unnecessary complexity. One canonical location per data entity. No shadow copies, no parallel tracking files, no orphan structures. Challenge: can this be achieved without adding a new file? Can this field live in an existing structure? Reject speculative abstractions.

          **Clarity**: Designs should be immediately understandable. Naming reveals intent, structure reveals relationships. If a design requires explanation, it is too complex.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: guardian
        display_name: GUARDIAN
        prompt: |
          Reviews implementation for overfit risk. READ THE ACTUAL CODE
          using Read, Grep, Glob tools - do not trust evidence text alone.
          Examine every code change against checklist below. Look for
          patterns where changes target specific test cases, benchmark
          scenarios, or datasets rather
          than genuinely improving system. Compare implementation against
          stated plan - did scope creep introduce overfit patterns?

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
        checklist: *guardian_checklist
      - name: forensicist
        display_name: FORENSICIST
        prompt: |
          Analyses failure modes and feeds insights into NEXT iteration:
          1. **What failed in this iteration?** Read test results, benchmark scores, checker outputs
          2. **Root cause classification**: for each failure, classify as:
             - GENERATIVE: LLM produced wrong output (prompt/brief issue)
             - PROGRAMMATIC: code calculated wrong values (algorithm/logic issue)
             - ARCHITECTURAL: system design doesn't support what's needed
          3. **Failure patterns**: are same failures repeating across iterations? If so, why
             haven't previous fixes worked?
          4. **Input for next iteration**: what specific hypotheses should NEXT iteration test?
             What files/functions are root cause? What measurable improvement to target?

          Forensicist's output is critical - feeds directly into RESEARCH phase of
          next iteration as prior context. Be specific: name files, line numbers, error messages.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
  end:
    template: |
      ## Phase: REVIEW (exit criteria)

      **Verify ALL**:
      - [ ] FOUR separate agents spawned (critic, architect, guardian, forensicist)
      - [ ] Agents provided on end: `--agents "critic,architect,guardian,forensicist"`
      - [ ] All four ran as SEPARATE agents (not self-review)
      - [ ] Verdicts merged: all approve OR rejection logged
      - [ ] If guardian flagged overfit: user asked and confirmed (or rejected)
      - [ ] Code references with file:line numbers for each verdict
      - [ ] Each verdict includes reasoning (not just APPROVE/REJECT)
      - [ ] Regression analysis: what could break, regressions to watch

      **BLOCKING**: phase cannot complete without --agents on end.

      **If REJECT**: run `{CMD} reject --reason "..."`
      This returns to IMPLEMENT with the combined feedback.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          AGENTS: required={required_agents} | recorded={recorded_agents}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: 4 agents spawned separately, verdicts merged,
          guardian overfit assessment completed.
          Evaluate verdict DEPTH: each agent must provide reasoning, not just APPROVE/REJECT. Missing reasoning = FAIL.
          IF context messages are active, evidence SHOULD reference or acknowledge them.

# ── RECORD (shared) ───────────────────────────────────────────────

RECORD:
  auto_actions:
    on_complete: [iteration_summary]
  start:
    template: |
      ## Phase: RECORD

      **Goal**: record iteration results.

      **Actions**:
      1. Write iteration summary
      2. Check `git status` for modified/staged files
      3. **If code changes exist**:
         - Append entry to `.claude/JOURNAL.md` (ALWAYS at end, NEVER insert)
         - Stage relevant files: `git add` (specific files, not -A)
         - Commit with descriptive message following project conventions
         - Push to remote
         - Verify push succeeded
      4. **If NO code changes**: iteration summary is sufficient, skip journal/commit/push

      {record_instructions}

      **Project policy**: If project's CLAUDE.md restricts git operations (e.g. requires explicit user approval for commits), follow those restrictions. CLAUDE.md always takes precedence over phase instructions. Record iteration summary regardless of git policy.

      **WHEN DONE**:
      ```
      {CMD} end --evidence "summary written [, journal updated, committed, pushed]"
      ```

      **Output**: iteration summary written. If code changed: journal updated, committed and pushed.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          IMPORTANT: If project CLAUDE.md restricts git operations, agent adapting to those restrictions is CORRECT behavior, not failure.
          Only require: iteration summary mentioned. Git operations conditional on project policy.
          Be lenient on phrasing.
  end:
    template: |
      ## Phase: RECORD (exit criteria)

      **Verify ALL**:
      - [ ] Iteration summary written
      - [ ] If code changes: journal entry appended, git commit, push succeeded
      - [ ] If no code changes: summary alone is sufficient

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EVIDENCE: {evidence}
          Check: iteration summary written.
          If evidence mentions code changes: also check journal entry, commit, push.
          If evidence states no code changes: summary alone is sufficient.

# ── NEXT (shared) ─────────────────────────────────────────────────

NEXT:
  auto_actions:
    on_complete: [iteration_advance]
  start:
    template_continue: |
      ## Phase: NEXT

      **{remaining} iteration(s) remaining** in this request (iteration {iteration} of {total}).

      **Review failure log** for this iteration:
      ```
      {CMD} failures
      ```

      If unsolved failures exist, consider adding them as:
      - Work items in PROGRAM.md
      - Verification items in BENCHMARK.md

      **PROCEED IMMEDIATELY to the next iteration** unless user explicitly asked to pause.

      **Stop decision**:
      - If objective 100% achieved and nothing remains to implement: STOP and report, regardless of iteration count.
      - If specific iteration count was requested: continue until count reached (unless objective 100% done).
      - If unlimited iterations: check program exit conditions each iteration. If no explicit exit conditions, use workflow stop condition to judge whether further optimization is worthwhile.
      - Safety cap: stop after {total} iterations if unlimited was requested.

    template_final: |
      ## Phase: NEXT

      **Final iteration complete.** All requested iterations done.

      **Review failure log**:
      ```
      {CMD} failures
      ```

      If unsolved failures exist, consider adding them as:
      - Work items in PROGRAM.md
      - Verification items in BENCHMARK.md

      **Report final status to user.** Start a new request with:
      ```
      {CMD} new --type full --objective "..." --iterations N
      ```

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: iteration advance or completion reporting.
          Be lenient on phrasing.
  end:
    template_continue: |
      ## Phase: NEXT (exit criteria)

      **{remaining} iteration(s) remaining.**
      Auto-increment will advance to next iteration.

    template_final: |
      ## Phase: NEXT (exit criteria)

      **All iterations complete.** Report status to user.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EVIDENCE: {evidence}
          Check: iteration advanced correctly or final status reported.
          If context items with status 'new' exist, FAIL - all context must be acknowledged, dismissed, or processed before iteration ends.
          LIFECYCLE CHECK: For each context/failure entry with status "acknowledged":
          - You MUST resolve it: mark processed (if acted upon) or dismissed (if not relevant)
          - Use: {CMD} context --processed <id> --note "reason" OR {CMD} context --dismiss <id> --note "reason"
          - Same for failures: {CMD} log-failure --processed <id> --note "reason"
          Entries with status "acknowledged" CANNOT survive past this phase.

# ── PLANNING workflow phases ──────────────────────────────────────

PLANNING::RESEARCH:
  auto_actions:
    on_complete: []
  start:
    template: |
      ## Phase: RESEARCH (Planning)

      **Objective**: {objective}

      **This is the PLANNING iteration.** Research goal: understand problem space
      and gather evidence for breaking down objective into implementation iterations.
      Focus on problem decomposition, not code-level investigation.

      {spawn_instruction}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.

      {agents_instructions}

      **CRITICAL: This phase is READ-ONLY.** Do NOT modify any project files.

      **AFTER all agents return**, write merged findings to a file, then:
      ```
      {CMD} end --evidence "summary" --agents "researcher,architect,product_manager" --output-file "{phase_dir}/research.md"
      ```

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: problem decomposition AND work breakdown focus.
          Be lenient on phrasing.
  execution:
    agents:
      - name: researcher
        display_name: RESEARCHER
        prompt: |
          Investigate problem space for work breakdown planning:
          - Read objective documents and specs
          - Assess overall scope and complexity
          - Identify major work areas and dependencies
          - Estimate effort per area

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: architect
        display_name: ARCHITECT
        prompt: |
          Analyse architecture for iteration planning:
          - Map file dependencies and change impact
          - Identify which changes must come first
          - Assess risk per area (high/medium/low)
          - Recommend iteration ordering

          **Occam's Razor**: Guard against unnecessary complexity. One canonical location per data entity. No shadow copies, no parallel tracking files, no orphan structures. Challenge: can this be achieved without adding a new file? Can this field live in an existing structure? Reject speculative abstractions.

          **Clarity**: Designs should be immediately understandable. Naming reveals intent, structure reveals relationships. If a design requires explanation, it is too complex.

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
      - name: product_manager
        display_name: PRODUCT MANAGER
        prompt: |
          Clarify scope and priorities for iteration planning:
          - What is must-have vs nice-to-have?
          - How many iterations are realistic?
          - What are the acceptance criteria per iteration?
          - What should be deferred if time runs out?

          **READ-ONLY**: Do NOT modify any files. Do NOT use Edit, Write, or any tool that changes files.
  end:
    template: |
      ## Phase: RESEARCH (exit criteria)

      **Verify ALL**:
      - [ ] THREE separate agents spawned
      - [ ] Research findings written to file
      - [ ] Problem space understood for work breakdown
      - [ ] Scope estimated for iteration planning

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          AGENTS: required={required_agents} | recorded={recorded_agents}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: 3 agents spawned, scope assessed for iteration planning.

PLANNING::PLAN:
  auto_actions:
    on_complete: [plan_save]
  start:
    template: |
      ## Phase: PLAN (Work Breakdown)

      **Objective**: {objective}
      **Planned iterations**: {total}

      Before creating final plan, explore 2-3 alternative approaches to decomposing work.
      Have contrarian agent challenge each approach. Select best with justification.

      **CRITICAL: NO CODE EDITS IN THIS PHASE.** Planning is READ-ONLY.
      Do NOT use Edit, Write, or any tool that modifies files (except plan output file).

      **Goal**: Break down objective into {total} iterations. For each iteration, define:
      1. **Scope**: which specific items/tasks this iteration will address
      2. **Files**: which files will be modified
      3. **Acceptance criteria**: how to verify iteration succeeded
      4. **Dependencies**: what must be done before this iteration can start

      **Important**: Be honest about what fits in {total} iterations. If objective
      is too large, say so and prioritise most impactful items first.

      **Format the plan as**:
      ```
      ITERATION 1: <title>
        Scope: <what this iteration does>
        Files: <which files change>
        Acceptance: <how to verify>
      ```

      Write the plan to a file, then:
      ```
      {CMD} end --evidence "plan breakdown complete" --output-file "{phase_dir}/plan.md"
      ```

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: planning AND iteration-level work breakdown.
          Be lenient on phrasing.
  execution:
    agents:
      - name: contrarian
        display_name: CONTRARIAN
        prompt: |
          Challenge proposed iteration plan:
          - Are there better alternative approaches not considered?
          - Is iteration ordering optimal?
          - What assumptions are being made without evidence?

          **READ-ONLY**: Do NOT modify any files.
  end:
    template: |
      ## Phase: PLAN (exit criteria)

      **Verify ALL**:
      - [ ] Work broken down into {total} iterations
      - [ ] Each iteration has scope, files, acceptance criteria
      - [ ] Dependencies between iterations identified
      - [ ] Deferred items listed if scope too large
      - [ ] Reasoning provided for iteration scope boundaries
      - [ ] Deferred items include justification for why they require additional iterations

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: work broken down into iterations with scope, files,
          and acceptance criteria per iteration.

# ── GC::PLAN ──────────────────────────────────────────────────────

GC::PLAN:
  auto_actions:
    on_complete: []
  start:
    template: |
      ## Phase: PLAN (GC)

      **Objective**: {objective}
      **Iteration**: {iteration}
      {prior_context}

      **CRITICAL: NO CODE EDITS IN THIS PHASE.** Planning is READ-ONLY.
      Do NOT use Edit, Write, or any tool that modifies files (except plan output file).

      **Goal**: scope garbage collection / cleanup work. GC plans are simpler
      than full iteration plans - no research or hypothesis phases precede this,
      so focus on identifying what to clean and why.

      **Execution** (MANDATORY - explore -> design -> write):
      1. Identify cleanup targets: dead code, stale references, duplicate logic
      2. For each target, state what to remove/change and why
      3. Write plan to file for `--output-file`

      **Output**: plan file listing cleanup targets with rationale.

    agents:
      - name: readback
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + one-line reason. No tools. No files.
          PHASE: {phase} | OBJECTIVE: {objective}
          INSTRUCTIONS: {instructions}
          UNDERSTANDING: {understanding}
          Must mention: cleanup scope AND read-only planning.
          Be lenient on phrasing.
  end:
    template: |
      ## Phase: PLAN (exit criteria - GC)

      **Verify ALL before proceeding**:
      - [ ] Cleanup targets identified with rationale
      - [ ] Each target has specific files and what to change
      - [ ] No scope creep - GC should clean, not add features
      - [ ] Risk assessment - what could removing this code break?

      {spawn_instruction_plan}
      Do NOT combine agents. Do NOT self-review. Each agent MUST be a separate Agent tool call.

      After agents return, write merged review to a file, then:
      ```
      {CMD} end --evidence "GC plan reviewed" --agents "architect,critic,guardian" --output-file "{phase_dir}/plan.md"
      ```

      {agents_instructions}

      If any agent flags issues, revise the plan before proceeding.

    agents:
      - name: gatekeeper
        mode: standalone_session
        prompt: |
          Reply PASS or FAIL + brief reason. No tools.
          PHASE: {phase}
          EXIT CRITERIA: {exit_criteria}
          OUTPUT: {output_status} | READBACK: {readback_status}
          EVIDENCE: {evidence}
          Check: cleanup targets identified with rationale, specific
          files listed, no feature additions disguised as cleanup.
