<!--
  ds-project-structure.svg - Data science project structure evolution
  Shows: progression from chaos -> cookiecutter conventions -> "what's next in 2026?"
  Intent: visual narrative of standardization journey with the open question
  Theme: Stellars-Tech
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <style>
    .fg-1 { fill: #1a5a6e; } .fg-2 { fill: #24697e; } .fg-3 { fill: #236a74; }
    .accent-1 { fill: #0096d1; } .accent-2 { fill: #005f7a; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; } .fg-2 { fill: #8fd4e6; } .fg-3 { fill: #5aafc5; }
      .accent-1 { fill: #5cc8e0; } .accent-2 { fill: #4099b3; }
    }
  </style>

  <!-- === GRID === viewBox 800x340. 3 era cards horizontal. Timeline ribbon at y=160. === -->
  <!-- === LAYOUT TOPOLOGY === h-stack: [chaos-era, cookiecutter-era, future-era] connected by timeline ribbon === -->

  <!-- Timeline ribbon background -->
  <rect x="40" y="156" width="720" height="8" rx="4" fill="#236a74" opacity="0.08"/>

  <!-- Era dots on timeline -->
  <circle cx="140" cy="160" r="6" fill="#da8230" opacity="0.6"/>
  <circle cx="400" cy="160" r="6" fill="#0096d1" opacity="0.8"/>
  <circle cx="660" cy="160" r="8" fill="#0096d1" stroke="#0096d1" stroke-width="2" fill-opacity="0.2"/>

  <!-- Timeline labels -->
  <text x="140" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#da8230" text-anchor="middle">before</text>
  <text x="400" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#0096d1" text-anchor="middle">cookiecutter v2</text>
  <text x="660" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#0096d1" text-anchor="middle" font-weight="600">2026?</text>

  <!-- ═══ ERA 1: Chaos (above timeline, left) ═══ -->
  <g id="era-chaos">
    <path d="M40,28 H260 V136 Q260,140 257,140 H43 Q40,140 40,136 Z" fill="#da8230" fill-opacity="0.03"/>
    <path d="M40,28 H260 V136 Q260,140 257,140 H43 Q40,140 40,136 Z" fill="none" stroke="#da8230" stroke-width="0.8"/>
    <rect x="40" y="28" width="220" height="5" fill="#da8230" opacity="0.5"/>

    <text x="150" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">The Chaos Era</text>

    <!-- Messy file structure (tilted, overlapping) -->
    <g opacity="0.5">
      <rect x="56" y="58" width="80" height="12" rx="2" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.4" transform="rotate(-2, 96, 64)"/>
      <text x="62" y="67" font-family="Segoe UI, monospace" font-size="7" class="fg-3">final_v3.py</text>

      <rect x="56" y="74" width="96" height="12" rx="2" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.4" transform="rotate(1, 104, 80)"/>
      <text x="62" y="83" font-family="Segoe UI, monospace" font-size="7" class="fg-3">model_FINAL2.pkl</text>

      <rect x="56" y="90" width="108" height="12" rx="2" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.4" transform="rotate(-1.5, 110, 96)"/>
      <text x="62" y="99" font-family="Segoe UI, monospace" font-size="7" class="fg-3">data_cleaned(1).csv</text>

      <rect x="56" y="106" width="90" height="12" rx="2" fill="#da8230" fill-opacity="0.03" stroke="#da8230" stroke-width="0.4" transform="rotate(2, 101, 112)"/>
      <text x="62" y="115" font-family="Segoe UI, monospace" font-size="7" class="fg-3">notebook7.ipynb</text>
    </g>

    <text x="200" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#da8230" text-anchor="middle">40-line README</text>
  </g>

  <!-- Arrow 1->2 on timeline -->
  <g transform="translate(280, 160) rotate(0)">
    <line x1="-14" y1="0" x2="-10" y2="0" stroke="#236a74" stroke-width="1.5" opacity="0.3"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#236a74" opacity="0.4"/>
  </g>

  <!-- ═══ ERA 2: Cookiecutter (above timeline, centre) ═══ -->
  <g id="era-cookiecutter">
    <path d="M290,28 H510 V136 Q510,140 507,140 H293 Q290,140 290,136 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M290,28 H510 V136 Q510,140 507,140 H293 Q290,140 290,136 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="290" y="28" width="220" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="400" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">Cookiecutter Conventions</text>

    <!-- Clean file structure (aligned, ordered) -->
    <g opacity="0.7">
      <rect x="306" y="58" width="72" height="12" rx="2" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.5"/>
      <text x="312" y="67" font-family="Segoe UI, monospace" font-size="7" class="fg-2">data/raw/</text>

      <rect x="306" y="74" width="90" height="12" rx="2" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.5"/>
      <text x="312" y="83" font-family="Segoe UI, monospace" font-size="7" class="fg-2">notebooks/</text>

      <rect x="306" y="90" width="60" height="12" rx="2" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.5"/>
      <text x="312" y="99" font-family="Segoe UI, monospace" font-size="7" class="fg-2">models/</text>

      <rect x="306" y="106" width="78" height="12" rx="2" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.5"/>
      <text x="312" y="115" font-family="Segoe UI, monospace" font-size="7" class="fg-2">Makefile</text>
    </g>

    <!-- Principles -->
    <text x="430" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Immutable data</text>
    <text x="430" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">DAG philosophy</text>
    <text x="430" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">make as task runner</text>
    <text x="430" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Opinions included</text>

    <text x="400" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" fill="#0096d1" text-anchor="middle">make install - that's it</text>
  </g>

  <!-- Arrow 2->3 on timeline -->
  <g transform="translate(530, 160) rotate(0)">
    <line x1="-14" y1="0" x2="-10" y2="0" stroke="#0096d1" stroke-width="1.5" opacity="0.4"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#0096d1" opacity="0.5"/>
  </g>

  <!-- ═══ ERA 3: What's Next (above timeline, right) ═══ -->
  <g id="era-future">
    <path d="M540,28 H760 V136 Q760,140 757,140 H543 Q540,140 540,136 Z" fill="#0096d1" fill-opacity="0.02"/>
    <path d="M540,28 H760 V136 Q760,140 757,140 H543 Q540,140 540,136 Z" fill="none" stroke="#0096d1" stroke-width="1" stroke-dasharray="6,3"/>
    <rect x="540" y="28" width="220" height="5" fill="#0096d1" opacity="0.3" stroke-dasharray="4,2"/>

    <text x="650" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">2026?</text>

    <!-- Question marks, possibilities -->
    <text x="650" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" text-anchor="middle">uv instead of conda?</text>
    <text x="650" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" text-anchor="middle">AI-aware scaffolding?</text>
    <text x="650" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" text-anchor="middle">Built-in GPU selection?</text>
    <text x="650" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" text-anchor="middle">Notebook conventions?</text>

    <text x="650" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#0096d1" text-anchor="middle">Is this the best we can do?</text>
  </g>

  <!-- ═══ BELOW TIMELINE: What we owe / what we question ═══ -->

  <!-- Left: what cookiecutter got right -->
  <path d="M40,180 H380 V320 Q380,324 377,324 H43 Q40,324 40,320 Z" fill="#0096d1" fill-opacity="0.02"/>
  <path d="M40,180 H380 V320 Q380,324 377,324 H43 Q40,324 40,320 Z" fill="none" stroke="#0096d1" stroke-width="0.6"/>
  <rect x="40" y="180" width="340" height="5" fill="#0096d1" opacity="0.4"/>

  <text x="210" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">Battle-tested conventions</text>

  <circle cx="62" cy="218" r="3" fill="#0096d1" opacity="0.4"/>
  <text x="74" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">data/raw means raw data - immutable, never modified</text>
  <circle cx="62" cy="238" r="3" fill="#0096d1" opacity="0.4"/>
  <text x="74" y="242" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">notebooks/ means notebooks - numbered, initialled</text>
  <circle cx="62" cy="258" r="3" fill="#0096d1" opacity="0.4"/>
  <text x="74" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">make install sets up everything - no guessing</text>
  <circle cx="62" cy="278" r="3" fill="#0096d1" opacity="0.4"/>
  <text x="74" y="282" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">New teammate picks it up in an afternoon, not a week</text>

  <text x="210" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">We owe a lot to that project.</text>

  <!-- Right: the open question -->
  <path d="M400,180 H760 V320 Q760,324 757,324 H403 Q400,324 400,320 Z" fill="#da8230" fill-opacity="0.02"/>
  <path d="M400,180 H760 V320 Q760,324 757,324 H403 Q400,324 400,320 Z" fill="none" stroke="#da8230" stroke-width="0.6" stroke-dasharray="6,3"/>
  <rect x="400" y="180" width="360" height="5" fill="#da8230" opacity="0.3"/>

  <text x="580" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">But in 2026...</text>

  <circle cx="422" cy="218" r="3" fill="#da8230" opacity="0.4"/>
  <text x="434" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">conda is slow, uv resolves in seconds</text>
  <circle cx="422" cy="238" r="3" fill="#da8230" opacity="0.4"/>
  <text x="434" y="242" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">AI agents need .claude/ directories and skill definitions</text>
  <circle cx="422" cy="258" r="3" fill="#da8230" opacity="0.4"/>
  <text x="434" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">Multi-GPU systems need CUDA_VISIBLE_DEVICES patterns</text>
  <circle cx="422" cy="278" r="3" fill="#da8230" opacity="0.4"/>
  <text x="434" y="282" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">Notebooks need structure: GPU cell, imports, config, seeds</text>

  <text x="580" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" fill="#da8230" text-anchor="middle">Is this truly the best we can do?</text>

</svg>
