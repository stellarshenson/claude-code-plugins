<!--
  07-three-principles.svg - Three design principles of pull-based workflow
  Shows: three large vertical cards side by side with icons and visual metaphors
  Intent: present the three core principles - Inversion of Control, Checks and Balances, Accumulated Knowledge
  Theme: Stellars-Tech - cyan palette
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <style>
    .fg-1 { fill: #1a5a6e; } .fg-2 { fill: #24697e; } .fg-3 { fill: #236a74; }
    .accent-1 { fill: #0096d1; } .accent-2 { fill: #005f7a; }
    .accent-cyan { fill: #0096d1; } .accent-orange { fill: #da8230; }
    .on-fill { fill: #1a5a6e; }
    .card-bg { fill-opacity: 0.04; } .connector { stroke-width: 1.5; }
    .arrow-head { opacity: 0.85; } .icon-stroke { stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; } .fg-2 { fill: #8fd4e6; } .fg-3 { fill: #5aafc5; }
      .accent-1 { fill: #5cc8e0; } .accent-2 { fill: #4099b3; }
      .accent-cyan { fill: #5cc8e0; } .accent-orange { fill: #d4a04a; }
      .on-fill { fill: #b8e4f0; }
    }
  </style>

  <!-- === GRID ===
    viewBox 800x340, margin 20
    3 cards side by side:
      Card 1: x=30..260, w=230
      Card 2: x=285..515, w=230
      Card 3: x=540..770, w=230
    Title: y=22
    Cards: y=44..320
    Each card: icon area (y=52..100), title (y=115), description (y=135..160), metaphor (y=170..280)
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-stack: [card-1, card-2, card-3]
    card-1: Inversion of Control - git-branch icon, redirected flow metaphor
    card-2: Checks and Balances - shield-check icon, two-sided scale metaphor
    card-3: Accumulated Knowledge - layers icon, stacking layers metaphor
  === -->

  <!-- Title -->
  <text x="400" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">THREE DESIGN PRINCIPLES</text>

  <!-- ═══ CARD 1: INVERSION OF CONTROL ═══ -->
  <g id="card-ioc">
    <path d="M30,44 H260 V314 Q260,317 257,317 H33 Q30,317 30,314 Z" class="card-bg" fill="#0096d1"/>
    <path d="M30,44 H260 V314 Q260,317 257,317 H33 Q30,317 30,314 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="30" y="44" width="230" height="5" fill="#0096d1" opacity="0.6"/>

    <!-- Number badge -->
    <circle cx="60" cy="70" r="14" fill="#0096d1" fill-opacity="0.12" stroke="#0096d1" stroke-width="0.8"/>
    <text x="60" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" class="accent-1" text-anchor="middle">1</text>

    <!-- Lucide git-branch icon (ISC license) -->
    <g transform="translate(90, 58)" fill="none" stroke="#0096d1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <line x1="6" y1="3" x2="6" y2="15" transform="scale(0.9)"/>
      <circle cx="14.4" cy="5.4" r="2.7"/>
      <circle cx="5.4" cy="2.7" r="2.7"/>
      <circle cx="5.4" cy="13.5" r="2.7"/>
      <path d="M14.4 8.1C14.4 12 6 12 6 15" transform="scale(0.9)"/>
    </g>

    <text x="145" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Inversion of Control</text>
    <text x="145" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">The orchestrator decides what runs</text>
    <text x="145" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">next. The agent only executes.</text>

    <!-- Visual metaphor: redirected flow arrow -->
    <g id="ioc-metaphor" transform="translate(70, 160)">
      <!-- Agent's intended path (faded, crossed out) -->
      <line x1="10" y1="20" x2="130" y2="20" stroke="#da8230" stroke-width="1" opacity="0.25" stroke-dasharray="4,2"/>
      <text x="70" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-orange" text-anchor="middle" opacity="0.5">agent's choice</text>

      <!-- Orchestrator's redirect -->
      <path d="M10,20 L50,20 Q60,20 60,35 L60,60 Q60,70 70,70 L130,70" fill="none" stroke="#0096d1" stroke-width="1.5" opacity="0.6"/>
      <g transform="translate(130, 70) rotate(0)">
        <polygon points="0,0 -7,-3.5 -7,3.5" fill="#0096d1" class="arrow-head"/>
      </g>
      <text x="100" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-cyan" text-anchor="middle">orchestrator's path</text>

      <!-- Redirect label -->
      <rect x="20" y="30" width="30" height="14" rx="3" fill="#0096d1" fill-opacity="0.1" stroke="#0096d1" stroke-width="0.5"/>
      <text x="35" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">pull</text>
    </g>

    <!-- Key fact -->
    <text x="145" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">Agent cannot skip phases,</text>
    <text x="145" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">reorder work, or self-promote.</text>
  </g>

  <!-- ═══ CARD 2: CHECKS AND BALANCES ═══ -->
  <g id="card-checks">
    <path d="M285,44 H515 V314 Q515,317 512,317 H288 Q285,317 285,314 Z" class="card-bg" fill="#0096d1"/>
    <path d="M285,44 H515 V314 Q515,317 512,317 H288 Q285,317 285,314 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="285" y="44" width="230" height="5" fill="#0096d1" opacity="0.6"/>

    <!-- Number badge -->
    <circle cx="315" cy="70" r="14" fill="#0096d1" fill-opacity="0.12" stroke="#0096d1" stroke-width="0.8"/>
    <text x="315" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" class="accent-1" text-anchor="middle">2</text>

    <!-- Lucide shield-check icon (ISC license) -->
    <g transform="translate(345, 58)" fill="none" stroke="#0096d1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <path d="M8 1L1 4.5V9c0 5 7 7.5 7 7.5s7-2.5 7-7.5V4.5L8 1z" transform="scale(0.85)"/>
      <polyline points="5,9 7,11 11,7" transform="scale(0.85)"/>
    </g>

    <text x="400" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Checks &amp; Balances</text>
    <text x="400" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">Independent subprocess validates</text>
    <text x="400" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">claims. No shared context.</text>

    <!-- Visual metaphor: two-sided scale / balance -->
    <g id="cb-metaphor" transform="translate(400, 200)">
      <!-- Balance beam -->
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#0096d1" stroke-width="1.5" opacity="0.5"/>
      <!-- Fulcrum -->
      <polygon points="0,0 -6,12 6,12" fill="#0096d1" fill-opacity="0.15" stroke="#0096d1" stroke-width="0.8"/>

      <!-- Left pan: Program -->
      <line x1="-60" y1="0" x2="-60" y2="20" stroke="#0096d1" stroke-width="0.8" opacity="0.4"/>
      <rect x="-85" y="20" width="50" height="26" rx="3" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6"/>
      <text x="-60" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">Program</text>
      <text x="-60" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">requirements</text>

      <!-- Right pan: Agent -->
      <line x1="60" y1="0" x2="60" y2="20" stroke="#da8230" stroke-width="0.8" opacity="0.4"/>
      <rect x="35" y="20" width="50" height="26" rx="3" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.6"/>
      <text x="60" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-orange" text-anchor="middle">Agent</text>
      <text x="60" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">claims</text>

      <!-- Compare label -->
      <text x="0" y="-10" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">compare</text>
    </g>

    <!-- Key fact -->
    <text x="400" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">Two ACP gates per phase.</text>
    <text x="400" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">Guardian runs in isolated process.</text>
  </g>

  <!-- ═══ CARD 3: ACCUMULATED KNOWLEDGE ═══ -->
  <g id="card-knowledge">
    <path d="M540,44 H770 V314 Q770,317 767,317 H543 Q540,317 540,314 Z" class="card-bg" fill="#0096d1"/>
    <path d="M540,44 H770 V314 Q770,317 767,317 H543 Q540,317 540,314 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="540" y="44" width="230" height="5" fill="#0096d1" opacity="0.6"/>

    <!-- Number badge -->
    <circle cx="570" cy="70" r="14" fill="#0096d1" fill-opacity="0.12" stroke="#0096d1" stroke-width="0.8"/>
    <text x="570" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" class="accent-1" text-anchor="middle">3</text>

    <!-- Lucide layers icon (ISC license) -->
    <g transform="translate(600, 56)" fill="none" stroke="#0096d1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <polygon points="8,0 0,4 8,8 16,4" transform="scale(0.9)"/>
      <polyline points="0,7 8,11 16,7" transform="scale(0.9)"/>
      <polyline points="0,10.5 8,14.5 16,10.5" transform="scale(0.9)"/>
    </g>

    <text x="655" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Accumulated Knowledge</text>
    <text x="655" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">Findings persist across iterations</text>
    <text x="655" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2" text-anchor="middle">in structured context files.</text>

    <!-- Visual metaphor: stacking layers -->
    <g id="ak-metaphor" transform="translate(655, 165)">
      <!-- Layer 1 (bottom, oldest - most faded) -->
      <rect x="-55" y="70" width="110" height="18" rx="3" fill="#0096d1" fill-opacity="0.04" stroke="#0096d1" stroke-width="0.5" opacity="0.5"/>
      <text x="0" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle" opacity="0.6">Iteration 1 findings</text>

      <!-- Layer 2 -->
      <rect x="-55" y="48" width="110" height="18" rx="3" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.5" opacity="0.65"/>
      <text x="0" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle" opacity="0.7">Iteration 2 findings</text>

      <!-- Layer 3 -->
      <rect x="-55" y="26" width="110" height="18" rx="3" fill="#0096d1" fill-opacity="0.08" stroke="#0096d1" stroke-width="0.6" opacity="0.8"/>
      <text x="0" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle" opacity="0.85">Iteration 3 findings</text>

      <!-- Layer 4 (top, newest - most prominent) -->
      <rect x="-55" y="4" width="110" height="18" rx="3" fill="#0096d1" fill-opacity="0.1" stroke="#0096d1" stroke-width="0.8"/>
      <text x="0" y="16" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">Current iteration</text>

      <!-- Upward growth arrow -->
      <line x1="65" y1="85" x2="65" y2="8" stroke="#0096d1" stroke-width="0.8" opacity="0.3"/>
      <g transform="translate(65, 8) rotate(-90)">
        <polygon points="0,0 -5,-2.5 -5,2.5" fill="#0096d1" opacity="0.4"/>
      </g>
      <text x="73" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-1" text-anchor="start" opacity="0.5">grows</text>
    </g>

    <!-- Key fact -->
    <text x="655" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">context.yaml + journal = memory</text>
    <text x="655" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">that outlives any single session.</text>
  </g>

  <!-- Bottom annotation -->
  <text x="400" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" text-anchor="middle">Each principle addresses a specific failure mode. Together they form the pull-based enforcement model.</text>

</svg>
