<!--
  10-end-to-end-journey.svg - End-to-end program-driven execution journey
  Shows: PROGRAM.md -> BENCHMARK.md -> ORCHESTRATOR -> ITERATE -> CONVERGE
  Intent: visualise the Karpathy-inspired objective function loop
  Theme: Stellars-Tech - teal/cyan primary, orange accent
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <style>
    .fg-1 { fill: #1a5a6e; } .fg-2 { fill: #24697e; } .fg-3 { fill: #236a74; }
    .accent-cyan { fill: #0096d1; } .accent-orange { fill: #da8230; }
    .accent-deep { fill: #005f7a; } .accent-teal { fill: #236a74; }
    .accent-gold { fill: #d4a04a; } .accent-green { fill: #2a8a4a; }
    .card-bg { fill-opacity: 0.04; }
    text { font-family: "Segoe UI", Arial, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; } .fg-2 { fill: #8fd4e6; } .fg-3 { fill: #5aafc5; }
      .accent-cyan { fill: #5cc8e0; } .accent-orange { fill: #d4a04a; }
      .accent-deep { fill: #4099b3; } .accent-teal { fill: #5aafc5; }
      .accent-gold { fill: #d4a04a; } .accent-green { fill: #5ac47a; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 800x260
    5 nodes: w=136, gap=20
    Node 1 (PROGRAM): x=20..156
    Node 2 (BENCHMARK): x=176..312
    Node 3 (ORCHESTRATE): x=332..468
    Node 4 (ITERATE): x=488..624
    Node 5 (CONVERGE): x=644..780
    Nodes: y=50..200
    Arrows at y=125
  === -->

  <text x="400" y="18" font-size="11" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">PROGRAM-DRIVEN EXECUTION</text>
  <text x="400" y="32" font-size="7" class="fg-3" text-anchor="middle">Inspired by Karpathy's autoresearch: define objective, define measurement, iterate until convergence</text>

  <!-- ═══ NODE 1: PROGRAM.md ═══ -->
  <g>
    <rect x="20" y="50" width="136" height="5" fill="#da8230" opacity="0.6"/>
    <path d="M20,50 H156 V197 Q156,200 153,200 H23 Q20,200 20,197 Z" class="card-bg" fill="#da8230"/>
    <path d="M20,50 H156 V197 Q156,200 153,200 H23 Q20,200 20,197 Z" fill="none" stroke="#da8230" stroke-width="0.8"/>
    <text x="88" y="72" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">PROGRAM.md</text>
    <text x="88" y="86" font-size="7" class="accent-orange" text-anchor="middle">What to achieve</text>
    <line x1="32" y1="94" x2="144" y2="94" stroke="#da8230" stroke-width="0.4" opacity="0.3"/>
    <circle cx="36" cy="110" r="2" fill="#da8230" fill-opacity="0.4"/>
    <text x="44" y="113" font-size="7" class="fg-3">Objective</text>
    <circle cx="36" cy="126" r="2" fill="#da8230" fill-opacity="0.4"/>
    <text x="44" y="129" font-size="7" class="fg-3">Work items</text>
    <circle cx="36" cy="142" r="2" fill="#da8230" fill-opacity="0.4"/>
    <text x="44" y="145" font-size="7" class="fg-3">Exit conditions</text>
    <circle cx="36" cy="158" r="2" fill="#da8230" fill-opacity="0.4"/>
    <text x="44" y="161" font-size="7" class="fg-3">Constraints</text>
    <rect x="32" y="176" width="112" height="14" rx="3" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.5"/>
    <text x="88" y="186" font-size="6" font-weight="600" class="accent-orange" text-anchor="middle">Human writes once</text>
  </g>

  <!-- Arrow 1->2 -->
  <line x1="156" y1="125" x2="172" y2="125" stroke="#da8230" stroke-width="1.5"/>
  <polygon points="176,125 168,121 168,129" fill="#da8230"/>

  <!-- ═══ NODE 2: BENCHMARK.md ═══ -->
  <g>
    <rect x="176" y="50" width="136" height="5" fill="#d4a04a" opacity="0.6"/>
    <path d="M176,50 H312 V197 Q312,200 309,200 H179 Q176,200 176,197 Z" class="card-bg" fill="#d4a04a"/>
    <path d="M176,50 H312 V197 Q312,200 309,200 H179 Q176,200 176,197 Z" fill="none" stroke="#d4a04a" stroke-width="0.8"/>
    <text x="244" y="72" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">BENCHMARK.md</text>
    <text x="244" y="86" font-size="7" class="accent-gold" text-anchor="middle">Objective function</text>
    <line x1="188" y1="94" x2="300" y2="94" stroke="#d4a04a" stroke-width="0.4" opacity="0.3"/>
    <circle cx="192" cy="110" r="2" fill="#d4a04a" fill-opacity="0.4"/>
    <text x="200" y="113" font-size="7" class="fg-3">Score formula</text>
    <circle cx="192" cy="126" r="2" fill="#d4a04a" fill-opacity="0.4"/>
    <text x="200" y="129" font-size="7" class="fg-3">Checklist items</text>
    <circle cx="192" cy="142" r="2" fill="#d4a04a" fill-opacity="0.4"/>
    <text x="200" y="145" font-size="7" class="fg-3">Iteration log</text>
    <circle cx="192" cy="158" r="2" fill="#d4a04a" fill-opacity="0.4"/>
    <text x="200" y="161" font-size="7" class="fg-3">Programmatic or generative</text>
    <rect x="188" y="176" width="112" height="14" rx="3" fill="#d4a04a" fill-opacity="0.08" stroke="#d4a04a" stroke-width="0.5"/>
    <text x="244" y="186" font-size="6" font-weight="600" class="accent-gold" text-anchor="middle">Measures improvement</text>
  </g>

  <!-- Arrow 2->3 -->
  <line x1="312" y1="125" x2="328" y2="125" stroke="#d4a04a" stroke-width="1.5"/>
  <polygon points="332,125 324,121 324,129" fill="#d4a04a"/>

  <!-- ═══ NODE 3: ORCHESTRATE ═══ -->
  <g>
    <rect x="332" y="50" width="136" height="5" fill="#0096d1" opacity="0.6"/>
    <path d="M332,50 H468 V197 Q468,200 465,200 H335 Q332,200 332,197 Z" class="card-bg" fill="#0096d1"/>
    <path d="M332,50 H468 V197 Q468,200 465,200 H335 Q332,200 332,197 Z" fill="none" stroke="#0096d1" stroke-width="0.8"/>
    <text x="400" y="72" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">ORCHESTRATE</text>
    <text x="400" y="86" font-size="7" class="accent-cyan" text-anchor="middle">FSM-enforced phases</text>
    <line x1="344" y1="94" x2="456" y2="94" stroke="#0096d1" stroke-width="0.4" opacity="0.3"/>
    <circle cx="348" cy="110" r="2" fill="#0096d1" fill-opacity="0.4"/>
    <text x="356" y="113" font-size="7" class="fg-3">8 phases, 15 agents</text>
    <circle cx="348" cy="126" r="2" fill="#0096d1" fill-opacity="0.4"/>
    <text x="356" y="129" font-size="7" class="fg-3">2 gates per phase</text>
    <circle cx="348" cy="142" r="2" fill="#0096d1" fill-opacity="0.4"/>
    <text x="356" y="145" font-size="7" class="fg-3">Guardian anti-overfit</text>
    <circle cx="348" cy="158" r="2" fill="#0096d1" fill-opacity="0.4"/>
    <text x="356" y="161" font-size="7" class="fg-3">--iterations 0</text>
    <rect x="344" y="176" width="112" height="14" rx="3" fill="#0096d1" fill-opacity="0.08" stroke="#0096d1" stroke-width="0.5"/>
    <text x="400" y="186" font-size="6" font-weight="600" class="accent-cyan" text-anchor="middle">Enforces discipline</text>
  </g>

  <!-- Arrow 3->4 -->
  <line x1="468" y1="125" x2="484" y2="125" stroke="#0096d1" stroke-width="1.5"/>
  <polygon points="488,125 480,121 480,129" fill="#0096d1"/>

  <!-- ═══ NODE 4: ITERATE ═══ -->
  <g>
    <rect x="488" y="50" width="136" height="5" fill="#005f7a" opacity="0.6"/>
    <path d="M488,50 H624 V197 Q624,200 621,200 H491 Q488,200 488,197 Z" class="card-bg" fill="#005f7a"/>
    <path d="M488,50 H624 V197 Q624,200 621,200 H491 Q488,200 488,197 Z" fill="none" stroke="#005f7a" stroke-width="0.8"/>
    <text x="556" y="72" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">ITERATE</text>
    <text x="556" y="86" font-size="7" class="accent-deep" text-anchor="middle">Score tracks progress</text>
    <line x1="500" y1="94" x2="612" y2="94" stroke="#005f7a" stroke-width="0.4" opacity="0.3"/>
    <text x="556" y="112" font-size="8" class="fg-2" text-anchor="middle">iter 1: score 17</text>
    <text x="556" y="128" font-size="8" class="fg-2" text-anchor="middle">iter 2: score 9</text>
    <text x="556" y="144" font-size="8" class="fg-2" text-anchor="middle">iter 3: score 3</text>
    <text x="556" y="160" font-size="8" font-weight="600" class="accent-green" text-anchor="middle">iter 4: score 0</text>
    <rect x="500" y="176" width="112" height="14" rx="3" fill="#005f7a" fill-opacity="0.08" stroke="#005f7a" stroke-width="0.5"/>
    <text x="556" y="186" font-size="6" font-weight="600" class="accent-deep" text-anchor="middle">Benchmark informs next</text>
  </g>

  <!-- Arrow 4->5 -->
  <line x1="624" y1="125" x2="640" y2="125" stroke="#005f7a" stroke-width="1.5"/>
  <polygon points="644,125 636,121 636,129" fill="#005f7a"/>

  <!-- ═══ NODE 5: CONVERGE ═══ -->
  <g>
    <rect x="644" y="50" width="136" height="5" fill="#2a8a4a" opacity="0.6"/>
    <path d="M644,50 H780 V197 Q780,200 777,200 H647 Q644,200 644,197 Z" class="card-bg" fill="#2a8a4a"/>
    <path d="M644,50 H780 V197 Q780,200 777,200 H647 Q644,200 644,197 Z" fill="none" stroke="#2a8a4a" stroke-width="0.8"/>
    <text x="712" y="72" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">CONVERGE</text>
    <text x="712" y="86" font-size="7" class="accent-green" text-anchor="middle">Exit conditions met</text>
    <line x1="656" y1="94" x2="768" y2="94" stroke="#2a8a4a" stroke-width="0.4" opacity="0.3"/>
    <circle cx="660" cy="110" r="2" fill="#2a8a4a" fill-opacity="0.4"/>
    <text x="668" y="113" font-size="7" class="fg-3">Score = 0</text>
    <circle cx="660" cy="126" r="2" fill="#2a8a4a" fill-opacity="0.4"/>
    <text x="668" y="129" font-size="7" class="fg-3">Or plateau (2 iters)</text>
    <circle cx="660" cy="142" r="2" fill="#2a8a4a" fill-opacity="0.4"/>
    <text x="668" y="145" font-size="7" class="fg-3">Tests pass</text>
    <circle cx="660" cy="158" r="2" fill="#2a8a4a" fill-opacity="0.4"/>
    <text x="668" y="161" font-size="7" class="fg-3">All work items done</text>
    <rect x="656" y="176" width="112" height="14" rx="3" fill="#2a8a4a" fill-opacity="0.08" stroke="#2a8a4a" stroke-width="0.5"/>
    <text x="712" y="186" font-size="6" font-weight="600" class="accent-green" text-anchor="middle">Human reviews result</text>
  </g>

  <!-- Feedback loop arc: ITERATE -> back to ORCHESTRATE -->
  <path d="M556,200 L556,224 L400,224 L400,204" fill="none" stroke="#005f7a" stroke-width="1.2" stroke-dasharray="5,3"/>
  <polygon points="400,200 396,208 404,208" fill="#005f7a" opacity="0.7"/>
  <text x="478" y="238" font-size="7" class="accent-deep" text-anchor="middle">score > 0: next iteration</text>

  <!-- Bottom annotation -->
  <rect x="200" y="248" width="400" height="10" rx="3" fill="#005f7a" fill-opacity="0.04"/>
  <text x="400" y="256" font-size="6" class="fg-3" text-anchor="middle">Human defines PROGRAM + BENCHMARK. Everything else runs autonomously until convergence.</text>

</svg>
