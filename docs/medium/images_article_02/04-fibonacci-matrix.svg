<!--
  17_fibonacci_scoring.svg - Fibonacci-based max score assignment
  Shows: 4 criteria with unit boxes (filled=scored, empty=remaining capacity)
  Theme: Meridian blue primary, teal accent for higher importance
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 292">
  <style>
    .fg-1 { fill: #1a4d94; } .fg-2 { fill: #2a5f9e; } .fg-3 { fill: #4a7ba7; } .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #006ba6; } .accent-teal { fill: #007a8a; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #a8d4f0; } .fg-2 { fill: #7ec0e6; } .fg-3 { fill: #5aafc5; } .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #4dc4ff; } .accent-teal { fill: #40c4d4; }
    }
  </style>

  <!-- === GRID ===
    viewBox 800x292, margin 8px left, 12px right
    Labels: right-aligned at x=88
    Boxes: x=100, each box 24x24 with 4px gap = 28px stride
    Row 1 (y=44):  5 boxes  → ends x=100+5*28-4=236
    Row 2 (y=94):  8 boxes  → ends x=100+8*28-4=320
    Row 3 (y=144): 13 boxes → ends x=100+13*28-4=460
    Row 4 (y=194): 21 boxes → ends x=100+21*28-4=684
    Score labels: 14px after last box
  === -->

  <text x="400" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">FIBONACCI MAX SCORES - IMPORTANCE WEIGHTING</text>
  <text x="400" y="32" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Each box = 1 point. Filled = scored, empty = remaining capacity. Example scores shown.</text>

