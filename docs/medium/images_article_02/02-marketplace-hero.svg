<!--
  01_marketplace_overview.svg - stellars-claude-code-plugins marketplace hero
  Shows: marketplace title band + 6 plugin cards in a 3-column x 2-row grid grouped by
  category (Build & Iterate / Critique & Validate / Communicate & Track), plus an
  install-line strip at the bottom.
  Intent: README hero infographic that says "this marketplace ships 6 plugins for
  structured AI-assisted work" at a glance.
  Theme: Stellars-Tech (teal primary, gold accent, Segoe UI, flat-top rounded-bottom cards).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .on-fill { fill: #e0f2f7; }
    .stroke-1 { stroke: #005f7a; }
    .stroke-2 { stroke: #7a4a15; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .stroke-1 { stroke: #5cc8e0; }
      .stroke-2 { stroke: #d4a04a; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox: 900x460, margin 20 all sides
    Header band: y=20..86 (66) - title + tagline
    Category strip: y=92..110 (18) - 3 column labels
    Card grid: y=120..380 (260) - 2 rows of 120 with 20px gutter
      Row 1: y=120..240
      Row 2: y=260..380
    Bottom strip: y=390..440 (50) - install command
    Card columns (276 wide each, 16px gutters):
      col1: x=20..296   (Build & Iterate)
      col2: x=312..588  (Critique & Validate)
      col3: x=604..880  (Communicate & Track)
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    v-stack: header, categories, card-grid, install-strip
    grid: 3 columns x 2 rows
    contain: card > accent-bar, name, tagline, divider, capability-chips, footer-stat
  === -->

  <!-- === HEADER BAND === -->
  <text x="20" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" class="fg-1">stellars-claude-code-plugins</text>
  <text x="20" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="11" class="fg-3">A marketplace for Claude Code - structured workflows for build, critique, and delivery</text>
  <text x="20" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-4" letter-spacing="1">6 PLUGINS - PURE CONFIG - YAML ENGINE - DARK MODE - PYPI - MIT</text>

  <!-- === CATEGORY LABELS === -->
  <text x="158" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="accent-1" letter-spacing="1.5" text-anchor="middle">BUILD &amp; ITERATE</text>
  <text x="450" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="accent-1" letter-spacing="1.5" text-anchor="middle">CRITIQUE &amp; VALIDATE</text>
  <text x="742" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="accent-1" letter-spacing="1.5" text-anchor="middle">COMMUNICATE &amp; TRACK</text>

  <!-- === CARD ROW 1 === -->

  <!-- Card 1.1: autobuild (col1, row1) x=20 y=120 w=276 h=120 -->
  <path d="M20,120 H296 V237 Q296,240 293,240 H23 Q20,240 20,237 Z" fill="#005f7a" fill-opacity="0.04"/>
  <path d="M20,120 H296 V237 Q296,240 293,240 H23 Q20,240 20,237 Z" fill="none" class="stroke-1" stroke-width="1"/>
  <rect x="20" y="120" width="276" height="5" fill="#005f7a" opacity="0.6"/>
  <text x="36" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" class="fg-1">autobuild</text>
  <text x="36" y="167" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="fg-3">YAML-driven phase orchestration</text>
  <line x1="36" y1="178" x2="280" y2="178" class="stroke-1" stroke-width="0.5" opacity="0.25"/>
