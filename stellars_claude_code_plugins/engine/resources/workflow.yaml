# ──────────────────────────────────────────────────────────────────
# workflow.yaml - Iteration type definitions
# ──────────────────────────────────────────────────────────────────
#
# PURPOSE: Defines the available iteration types and their phase
# sequences. Each type is a named workflow that determines which
# phases run and in what order.
#
# NAMING: Every workflow uses Fully Qualified Names (FQN) with the
# pattern WORKFLOW::NAME. The cli_name attribute is the short form
# used for the --type flag. Internal references always use FQN.
# There is NO fallback chain - every reference must resolve exactly.
#
# HOW IT WORKS: The Python engine loads this at startup and derives
# ITERATION_TYPES dict keyed by cli_name. The `new` command's
# --type flag selects which workflow via cli_name.
#
# PHASE STRUCTURE: Each phase is a dict with a `name` field and an
# optional `skippable: true` flag. Phases are REQUIRED by default -
# the gatekeeper will deny skip requests for required phases unless
# --force is used with a compelling reason.
#
# TO CUSTOMIZE: Add a new iteration type by adding a top-level key
# with FQN, cli_name, description and phases list. Example:
#
#   WORKFLOW::REVIEW_ONLY:
#     cli_name: review_only
#     description: "Review existing work without new implementation"
#     phases:
#       - name: RESEARCH
#       - name: REVIEW
#       - name: RECORD
#       - name: NEXT
#         skippable: true
# ──────────────────────────────────────────────────────────────────

# ── Actions ────────────────────────────────────────────────────────
# Named actions referenced by phases.yaml auto_actions. Each action
# uses FQN ACTION::NAME with cli_name for phases.yaml references.

actions:
  ACTION::PLAN_SAVE:
    cli_name: plan_save
    type: programmatic
    description: "Save PLAN output to plan.yaml for dependency workflows"
  ACTION::ITERATION_SUMMARY:
    cli_name: iteration_summary
    type: programmatic
    description: "Write iteration_N.md executive summary from phase outputs"
  ACTION::ITERATION_ADVANCE:
    cli_name: iteration_advance
    type: programmatic
    description: "Advance to next iteration, reset phase state"
  ACTION::HYPOTHESIS_AUTOWRITE:
    cli_name: hypothesis_autowrite
    type: generative
    description: "Extract structured hypotheses from phase output"
    prompt: |
      Read the hypothesis output and extract structured entries.
      For each hypothesis write: ID, HYPOTHESIS, PREDICT, EVIDENCE, RISK, STARS.
      Read existing hypotheses.yaml first. APPEND new entries to the list.
      UPDATE existing entries by matching ID field.
      Do NOT overwrite or remove existing entries.
  ACTION::HYPOTHESIS_GC:
    cli_name: hypothesis_gc
    type: generative
    description: "Archive DONE/REMOVED hypotheses to archive file"
    prompt: |
      Read hypotheses.yaml. Move entries with status DONE or REMOVED
      to hypotheses_archive.yaml. Keep only active hypotheses in main file.

# Planning - non-independent workflow that auto-chains before full workflow.
# Cannot be invoked directly via --type. Breaks down the objective into
# N implementation iterations with scope, files, and acceptance criteria.
WORKFLOW::PLANNING:
  cli_name: planning
  description: "Planning iteration: research, break down work into implementation iterations"
  independent: false
  phases:
    - name: RESEARCH
    - name: PLAN           # resolves to PLANNING::PLAN (work breakdown)
    - name: RECORD
    - name: NEXT
      skippable: true

# Full iteration - the complete research-driven improvement cycle.
# Used for feature work, improvements, and research-driven changes.
# Depends on planning workflow (auto-runs before first iteration).
WORKFLOW::FULL:
  cli_name: full
  depends_on: WORKFLOW::PLANNING
  description: "Full iteration: research, hypothesise, plan, implement, test, review, record"
  phases:
    - name: RESEARCH       # Gather evidence, read code, understand problem space
    - name: HYPOTHESIS     # Debate approaches with 4 agents, rank by star rating
    - name: PLAN           # Design implementation with 3-agent review
    - name: IMPLEMENT      # Make code changes with predict/verify loop
    - name: TEST           # Automated: make test + make lint + benchmark
    - name: REVIEW         # 4-agent independent review (critic/architect/guardian/forensicist)
    - name: RECORD         # Journal, commit, push
    - name: NEXT           # Advance to next iteration or report completion
      skippable: true      # NEXT is optional - controls iteration advance

# Garbage collection - cleanup, dead code removal, refactoring.
# Skips research and hypothesis phases since scope is usually clear.
WORKFLOW::GC:
  cli_name: gc
  description: "Garbage collection / cleanup"
  phases:
    - name: PLAN
    - name: IMPLEMENT
    - name: TEST
    - name: RECORD
    - name: NEXT
      skippable: true

# Hotfix - targeted bug fix with minimal ceremony.
# No planning iteration, no review agents - just fix, test, record.
WORKFLOW::HOTFIX:
  cli_name: hotfix
  description: "Targeted fix, minimal ceremony"
  phases:
    - name: IMPLEMENT
    - name: TEST
    - name: RECORD

# Fast iteration - skips research and hypothesis. For when the objective
# is clear and no exploration is needed. No planning dependency.
WORKFLOW::FAST:
  cli_name: fast
  description: "Fast iteration: plan, implement, test, review, record"
  phases:
    - name: PLAN
    - name: IMPLEMENT
    - name: TEST
    - name: REVIEW
    - name: RECORD
    - name: NEXT
      skippable: true
