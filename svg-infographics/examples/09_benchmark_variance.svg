<!--
  09_benchmark_variance.svg - Repeated runs and confidence bands
  Theme: Meridian blue baseline, teal new config, red 2-sigma threshold, green verdict
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <style>
    .fg-1 { fill: #1a4d94; } .fg-2 { fill: #2a5f9e; } .fg-3 { fill: #4a7ba7; } .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #006ba6; } .accent-teal { fill: #007a8a; }
    .semantic-good { fill: #1a7a5a; } .semantic-risk { fill: #a03030; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #a8d4f0; } .fg-2 { fill: #7ec0e6; } .fg-3 { fill: #5aafc5; } .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #4dc4ff; } .accent-teal { fill: #40c4d4; }
      .semantic-good { fill: #4cb8a0; } .semantic-risk { fill: #e06060; }
    }
  </style>

  <!-- === GRID ===
    viewBox 800x340, margin 20px
    Two cards stacked vertically for wider number lines:
    Baseline: x=20..780, y=36..150
    New config: x=20..780, y=168..282
    Number lines span x=50..750 (700px wide)
    Baseline axis: 19..25 -> 700/6 = 116.7px per unit
    Dots y=108, brackets y=78..96
    Verdict: y=298..330
    Legend: y=330 (inside verdict)
  === -->

  <text x="400" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">BENCHMARK VARIANCE - IS THE IMPROVEMENT REAL?</text>

  <!-- ═══ Baseline (blue) - full width ═══ -->
  <g>
    <path d="M20,36 H780 V147 Q780,150 777,150 H23 Q20,150 20,147 Z" fill="#00a6ff" fill-opacity="0.04"/>
    <path d="M20,36 H780 V147 Q780,150 777,150 H23 Q20,150 20,147 Z" fill="none" stroke="#00a6ff" stroke-width="1"/>
    <rect x="20" y="36" width="760" height="5" fill="#00a6ff" opacity="0.6"/>
    <text x="400" y="56" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Baseline (K=5, no re-ranker)</text>

    <!-- Axis: 19..25, x=50..750, 1 unit = 116.7px -->
    <!-- Score positions: 20.6=x=236, 21.0=x=283, 21.4=x=330, 21.8=x=377, 22.2=x=423, 23.0=x=517 -->

    <!-- 2σ bracket: 19.8..23.0, x=143..517 -->
    <line x1="143" y1="76" x2="143" y2="72" stroke="#a03030" stroke-width="0.8" opacity="0.5"/>
    <line x1="143" y1="72" x2="517" y2="72" stroke="#a03030" stroke-width="0.8" opacity="0.5"/>
    <line x1="517" y1="72" x2="517" y2="76" stroke="#a03030" stroke-width="0.8" opacity="0.5"/>
    <text x="330" y="69" class="semantic-risk" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">2σ</text>

    <!-- 1σ bracket: 20.6..22.2, x=236..423 -->
    <line x1="236" y1="88" x2="236" y2="84" stroke="#00a6ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="236" y1="84" x2="423" y2="84" stroke="#00a6ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="423" y1="84" x2="423" y2="88" stroke="#00a6ff" stroke-width="0.8" opacity="0.5"/>
    <text x="330" y="82" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">1σ</text>

    <!-- Number line at y=108 -->
    <line x1="50" y1="108" x2="750" y2="108" stroke="#00a6ff" stroke-width="0.8" opacity="0.3"/>
    <text x="50" y="124" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">19</text>
    <text x="750" y="124" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">25</text>

    <!-- 2σ threshold dashed line at 23.0 = x=517 -->
    <line x1="517" y1="96" x2="517" y2="120" stroke="#a03030" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="530" y="120" class="semantic-risk" font-family="Segoe UI, Arial, sans-serif" font-size="6">2σ: 23.0</text>

    <!-- Stdev band -->
    <rect x="236" y="102" width="187" height="12" rx="3" fill="#00a6ff" fill-opacity="0.12"/>

    <!-- Run dots -->
    <circle cx="236" cy="108" r="6" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>
    <circle cx="283" cy="108" r="6" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>
    <circle cx="330" cy="108" r="6" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>
    <circle cx="377" cy="108" r="6" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>
    <circle cx="423" cy="108" r="6" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>

    <!-- Mean marker with μ annotation -->
    <line x1="330" y1="96" x2="330" y2="120" stroke="#00a6ff" stroke-width="2.5"/>
    <text x="330" y="134" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" text-anchor="middle">μ = 21.4</text>

    <!-- Stats (right side of card) -->
    <text x="640" y="76" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Mean: 21.4</text>
    <text x="640" y="96" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Std: 0.8</text>
    <text x="640" y="120" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Range: 20.6 - 22.2</text>
    <text x="640" y="140" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">5 runs | 2σ threshold: 23.0</text>
  </g>

  <!-- ═══ New config (teal) - full width ═══ -->
  <g>
    <path d="M20,168 H780 V279 Q780,282 777,282 H23 Q20,282 20,279 Z" fill="#0096a6" fill-opacity="0.04"/>
    <path d="M20,168 H780 V279 Q780,282 777,282 H23 Q20,282 20,279 Z" fill="none" stroke="#0096a6" stroke-width="1"/>
    <rect x="20" y="168" width="760" height="5" fill="#0096a6" opacity="0.6"/>
    <text x="400" y="188" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">New Config (K=10, with re-ranker)</text>

    <!-- Same axis: 19..25, x=50..750 -->
    <!-- Score positions: 22.7=x=481, 23.0=x=517, 23.1=x=528, 23.2=x=540, 23.5=x=575, 23.8=x=610, 23.9=x=622, 24.0=x=633, 24.3=x=668 -->

    <!-- 2σ bracket: 22.7..24.3, x=481..668 -->
    <line x1="481" y1="208" x2="481" y2="204" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <line x1="481" y1="204" x2="668" y2="204" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <line x1="668" y1="204" x2="668" y2="208" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <text x="575" y="201" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">2σ</text>

    <!-- 1σ bracket: 23.1..23.9, x=528..622 -->
    <line x1="528" y1="220" x2="528" y2="216" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <line x1="528" y1="216" x2="622" y2="216" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <line x1="622" y1="216" x2="622" y2="220" stroke="#0096a6" stroke-width="0.8" opacity="0.5"/>
    <text x="575" y="213" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">1σ</text>

    <!-- Number line at y=240 -->
    <line x1="50" y1="240" x2="750" y2="240" stroke="#0096a6" stroke-width="0.8" opacity="0.3"/>
    <text x="50" y="256" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">19</text>
    <text x="750" y="256" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">25</text>

    <!-- Baseline 2σ threshold dashed line at 23.0 = x=517 -->
    <line x1="517" y1="228" x2="517" y2="252" stroke="#a03030" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="504" y="260" class="semantic-risk" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end">baseline 2σ</text>

    <!-- Stdev band -->
    <rect x="528" y="234" width="105" height="12" rx="3" fill="#0096a6" fill-opacity="0.15"/>

    <!-- Run dots -->
    <circle cx="528" cy="240" r="6" fill="#0096a6" fill-opacity="0.5" stroke="#0096a6" stroke-width="1"/>
    <circle cx="540" cy="240" r="6" fill="#0096a6" fill-opacity="0.5" stroke="#0096a6" stroke-width="1"/>
    <circle cx="575" cy="240" r="6" fill="#0096a6" fill-opacity="0.5" stroke="#0096a6" stroke-width="1"/>
    <circle cx="610" cy="240" r="6" fill="#0096a6" fill-opacity="0.5" stroke="#0096a6" stroke-width="1"/>
    <circle cx="633" cy="240" r="6" fill="#0096a6" fill-opacity="0.5" stroke="#0096a6" stroke-width="1"/>

    <!-- Mean marker with μ annotation -->
    <line x1="575" y1="228" x2="575" y2="252" stroke="#0096a6" stroke-width="2.5"/>
    <text x="575" y="266" class="accent-teal" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" text-anchor="middle">μ = 23.5</text>

    <!-- Stats (left side of card, away from dots) -->
    <text x="160" y="208" class="accent-teal" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Mean: 23.5</text>
    <text x="160" y="228" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Std: 0.4</text>
    <text x="160" y="252" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Range: 23.1 - 24.0</text>
    <text x="160" y="272" class="semantic-good" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" text-anchor="middle">All 5 runs exceed baseline 2σ</text>
  </g>

  <!-- ═══ Verdict (green) ═══ -->
  <path d="M20,298 H780 V327 Q780,330 777,330 H23 Q20,330 20,327 Z" fill="#1a7a5a" fill-opacity="0.03"/>
  <path d="M20,298 H780 V327 Q780,330 777,330 H23 Q20,330 20,327 Z" fill="none" stroke="#1a7a5a" stroke-width="0.8" opacity="0.3"/>
  <rect x="20" y="298" width="760" height="4" fill="#1a7a5a" opacity="0.25"/>

  <!-- Verdict text + legend on same row -->
  <text x="40" y="320" class="semantic-good" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">23.5 > 23.0 (baseline + 2σ) - real improvement</text>
  <circle cx="430" cy="316" r="5" fill="#00a6ff" fill-opacity="0.4" stroke="#00a6ff" stroke-width="1"/>
  <text x="440" y="320" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="7">benchmark run</text>
  <line x1="510" y1="316" x2="530" y2="316" stroke="#00a6ff" stroke-width="2.5"/>
  <text x="534" y="320" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="7">μ (mean)</text>
  <line x1="580" y1="316" x2="600" y2="316" stroke="#a03030" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="604" y="320" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="7">2σ threshold</text>
  <rect x="680" y="310" width="20" height="12" rx="2" fill="#00a6ff" fill-opacity="0.12"/>
  <text x="704" y="320" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="7">1σ band</text>
</svg>
