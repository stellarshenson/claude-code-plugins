<!--
  header_banner.svg - Project proposal title page header
  Shows: main title (Gender Pay Gap Analysis), subtitle (Meridian International AB),
  team credits (Kolomolo LTD with initials), bottom accent gradient bar.
  Meridian logo (top-right). Kolomolo "K" logo beside it.
  Intent: first visual element in the proposal document, sets brand tone.
  Theme: Meridian palette (fg-1 #103d82, fg-2 #2a5f9e, fg-3 #4a7ba7, accent gradient).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110">
  <style>
    .dl-fg1 { fill: #103d82; }
    .dl-fg2 { fill: #2a5f9e; }
    .dl-fg3 { fill: #4a7ba7; }
    @media (prefers-color-scheme: dark) {
      .dl-fg1 { fill: #66ccff; }
      .dl-fg2 { fill: #88d4ff; }
      .dl-fg3 { fill: #99bbdd; }
    }
  </style>
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a6ff"/>
      <stop offset="100%" style="stop-color:#66ccff"/>
    </linearGradient>
    <linearGradient id="kol_grad" x1="0" y1="1.33" x2="87.13" y2="163.58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1CD77F"/>
      <stop offset="0.229" stop-color="#1687FD"/>
      <stop offset="0.404" stop-color="#383AF3"/>
      <stop offset="0.6" stop-color="#D840A5"/>
      <stop offset="0.8" stop-color="#EC7858"/>
      <stop offset="1" stop-color="#F2C036"/>
    </linearGradient>
  </defs>
  <rect x="0" y="100" width="800" height="10" rx="0" fill="url(#accent)" opacity="0.6"/>
  <text x="40" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" class="dl-fg1">Gender Pay Gap Analysis</text>
  <text x="40" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="18" class="dl-fg3">Project Proposal for Meridian International AB</text>
  <text x="40" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="12" class="dl-fg3">Prepared by Kolomolo LTD (K. Jelen, N. Braniewska, M. Baron, A. Barjamaj) | February 2026</text>
  <!-- Decorative HR/analytics imagery (subtle, Meridian blue) -->
  <!-- Bar chart -->
  <rect x="472" y="22" width="5" height="18" rx="1" fill="#103d82" opacity="0.35"/>
  <rect x="480" y="14" width="5" height="26" rx="1" fill="#103d82" opacity="0.35"/>
  <rect x="488" y="26" width="5" height="14" rx="1" fill="#103d82" opacity="0.35"/>
  <rect x="496" y="10" width="5" height="30" rx="1" fill="#103d82" opacity="0.35"/>
  <line x1="470" y1="40" x2="503" y2="40" stroke="#103d82" stroke-width="0.7" opacity="0.35"/>
  <!-- Balance scale -->
  <line x1="548" y1="10" x2="548" y2="38" stroke="#103d82" stroke-width="1" opacity="0.35"/>
  <line x1="536" y1="16" x2="560" y2="16" stroke="#103d82" stroke-width="1" opacity="0.35"/>
  <path d="M536,16 L532,26 H540 Z" fill="none" stroke="#103d82" stroke-width="0.7" opacity="0.35"/>
  <path d="M560,16 L556,26 H564 Z" fill="none" stroke="#103d82" stroke-width="0.7" opacity="0.35"/>
  <rect x="544" y="38" width="8" height="2.5" rx="1" fill="#103d82" opacity="0.35"/>
  <!-- Trend line with dots -->
  <path d="M510,60 L524,52 L538,56 L552,44 L566,40" fill="none" stroke="#103d82" stroke-width="0.8" opacity="0.30"/>
  <circle cx="517" cy="55" r="1.5" fill="#103d82" opacity="0.30"/>
  <circle cx="538" cy="56" r="1.5" fill="#103d82" opacity="0.30"/>
  <circle cx="559" cy="42" r="1.5" fill="#103d82" opacity="0.30"/>
  <!-- EU stars ring -->
  <circle cx="600" cy="24" r="10" fill="none" stroke="#103d82" stroke-width="0.6" opacity="0.30"/>
  <circle cx="600" cy="14" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="606" cy="15.5" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="610" cy="20" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="610" cy="28" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="606" cy="32.5" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="600" cy="34" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="594" cy="32.5" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="590" cy="28" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="590" cy="20" r="1" fill="#103d82" opacity="0.30"/>
  <circle cx="594" cy="15.5" r="1" fill="#103d82" opacity="0.30"/>

  <!-- Logo grid: right-aligned, 12px padding from edges, 8px gap between logos, ~65px height each -->
  <!-- Meridian logo (local bounds ~19..179 x 24..154, scale 0.5 -> 80x65px) -->
  <g transform="translate(639, -4) scale(0.5)">
    <path d="M117.861 107.85c2.385 2.936 8.348 10.641 8.348 10.641s-5.963 7.705-8.348 10.639c-3.025 3.67-7.703 6.055-12.84 6.055-9.265 0-16.694-7.521-16.694-16.693 0-9.174 7.43-16.693 16.694-16.693 5.137-.002 9.815 2.383 12.84 6.051z" fill="#103d82"/>
    <path d="M168.494 153.252c-8.99-1.008-16.695-5.41-24.398-13.391-1.102-1.193-2.66-2.844-4.221-4.678-2.109 2.66-4.127 5.045-5.502 6.787-4.221 5.137-8.623 8.988-15.777 11.281v.275h49.898v-.274z" fill="#103d82"/>
    <path d="M179.316 85.561h-26.599l-12.842 15.96 13.576 16.418 25.865-32.378z" fill="#d35d35"/>
    <path d="M134.465 94.55L93.831 24.198l-74.755 129.33h73.012v-.275c-12.566-3.484-24.766-17.244-24.766-34.762 0-20.822 16.877-37.607 37.699-37.607 11.557 0 21.371 4.862 29.076 13.942l.368-.276z" fill="#103d82"/>
  </g>
  <!-- Kolomolo K logo (local bounds ~0..39 x 0..49, scale 1.33 -> 52x65px) -->
  <g transform="translate(736, 8) scale(1.33)">
    <path d="m 3.561,35.248 c -1.475,0 -2.677,-1.223 -2.677,-2.715 V 1.491 c 0,-0.654 0.516,-1.18 1.149,-1.18 h 4.636 c 0.632,0 1.159,0.526 1.159,1.18 V 22.007 c 0,0 11.191,-11.245 12.508,-12.533 5.153,-5.075 10.084,-7.897 14.5,-7.897 0.569,0 2.023,0 2.539,0 1.296,0 1.201,1.202 1.201,1.202 l -0.031,4.71 c 0,0.633 -0.506,1.159 -1.138,1.159 -0.4,0 -1.981,0 -2.561,0 -1.159,0 -4.426,0.569 -9.589,5.816 -3.33,3.391 -4.879,4.968 -5.817,5.73 L 5.447,34.444 c -0.506,0.515 -1.17,0.794 -1.876,0.794 z" fill="url(#kol_grad)"/>
    <path d="M 30.243,48.693 19.726,37.309 c -3.836,3.82 -7.208,7.189 -7.787,7.779 0,0 -3.804,4.196 -7.597,4.196 H 1.159 C 0.527,49.283 0,48.758 0,48.103 V 43.382 C 0,42.727 0.516,42.202 1.159,42.202 H 4.363 c 0.369,-0.011 1.58,-0.837 2.402,-1.824 0,0 17.008,-17.061 20.432,-20.183 3.267,-2.972 5.954,-3.595 7.64,-3.605 0.242,0 2.645,0 2.645,0 0.632,0 1.149,0.526 1.149,1.18 l -0.021,4.721 c -0.011,0.665 -0.516,1.17 -1.149,1.17 h -2.613 c 0,0 -1.075,0.032 -3.014,1.803 -1.064,0.966 -3.456,3.283 -7.102,6.889 l 13.72,14.936 c 0.316,0.343 0.4,0.837 0.221,1.277 -0.179,0.429 -0.601,0.708 -1.064,0.708 h -6.006 c -0.506,0 -0.991,-0.215 -1.338,-0.59 z" fill="url(#kol_grad)"/>
  </g>
</svg>
