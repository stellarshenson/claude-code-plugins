  <g transform="translate(758, 99) scale(0.5)" fill="none" stroke="#808080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="m11 17 2 2a1 1 0 1 0 3-3"/>
    <path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/>
    <path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/>
  </g>
  <text x="616" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Methodology paper</text>
