  <path d="M400,200 L403,195 H417 L420,200 L417,205 H403 Z" class="wave-buff"/>
  <text x="426" y="203" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Contingency buffer (1 week)</text>
