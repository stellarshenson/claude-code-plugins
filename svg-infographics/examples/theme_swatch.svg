<!--
  theme_swatch.svg - Nexus palette derived from Stellars-Tech JupyterHub logo
  Shows: all shade grades (fg-1 to fg-4, accent-1/2, bg-1/2) across three sections:
  transparent background (palette reference), light strip (#f5f7fa), dark strip (#1e1e1e).
  Intent: validate Nexus infographic palette before producing deliverables.
  Theme: Stellars-Tech derived - teal/cyan primary, orange accent.
  fg-1 = most contrastive (brightest), fg-4 = least contrastive (still readable).
  Source: stellars-tech_jupyterhub_logo_basic.svg brand colours #4099b3, #0096d1, #da8230.

  === DESIGN NOTES (card shape + arrow conventions) ===

  CARD SHAPE:
  - Flat top edge (square corners), rounded bottom corners only
  - Bottom corner radius: r=3 (tight, nearly square)
  - Accent bar: flat rect at top, height=5, accent colour at opacity 0.6
  - Fill: accent colour at fill-opacity 0.04
  - Stroke: accent colour at stroke-width 1
  - Path template for card at (x, y, w, h, r=3):
      fill:   M{x},{y} H{x+w} V{y+h-r} Q{x+w},{y+h} {x+w-r},{y+h} H{x+r} Q{x},{y+h} {x},{y+h-r} Z
      stroke: same path, fill="none" stroke="{colour}" stroke-width="1"
      bar:    rect x={x} y={y} width={w} height=5 fill="{colour}" opacity="0.6"

  ARROW CONVENTIONS:
  - Pipeline flow arrows: solid lines, tips touch shape edges
  - Escalation arrows: solid lines (not dashed), same weight
  - L-shaped routing: chamfered bends (4px diagonal at each 90-degree turn)
  - Chamfer template: instead of sharp V{y1} H{x2}, use V{y1-4} L{x+4},{y1} H{x2-4} L{x2},{y1+4}
  - Arrow tips: polygon triangles, 6px base, 4px depth; stem ends at back of head (no protrusion)
  - Straight-down arrows preferred when source and target are vertically aligned
  - Stagger vertical midpoints when multiple L-connectors share a gap to avoid overlap

  CONTAINER SHAPE:
  - Same flat-top-rounded-bottom as cards but more muted
  - Fill: accent colour at opacity 0.02
  - Stroke: accent colour at stroke-width 0.8, opacity 0.25
  - Accent bar: height=4, opacity 0.15

  === END DESIGN NOTES ===
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 528">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .on-fill { fill: #e0f2f7; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .on-fill { fill: #e0f2f7; }
    }
  </style>

  <g id="guide-grid" display="none">
    <line x1="0" y1="0" x2="800" y2="0" stroke="red" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="520" stroke="red" stroke-width="0.5"/>
    <line x1="0" y1="520" x2="800" y2="520" stroke="red" stroke-width="0.5"/>
  </g>

  <!-- === GRID REFERENCE ===
    viewBox: 800x520
    Margin: 20px all sides
    Palette section: y=0..150
    Light strip: y=166..330
    Dark strip: y=346..510
    Columns: left=20, mid=400, right=780
    Vertical rhythm: 14px base
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    v-stack: palette-ref, light-strip, dark-strip
    mirror: light-strip, dark-strip (identical internal layout)
    contain: light-strip > card, stats, arrows, icon-samples, coverage-bar
    contain: dark-strip > card, stats, arrows, icon-samples, coverage-bar
  === -->

  <!-- === SECTION 1: Palette Reference (transparent bg, uses CSS classes) === -->
  <g id="palette-ref">
    <text x="20" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" letter-spacing="1">Nexus THEME SWATCH (STELLARS-TECH DERIVED)</text>
    <line x1="20" y1="26" x2="780" y2="26" stroke="#0096d1" stroke-width="0.5" opacity="0.3"/>

    <!-- Foreground shades: fg-1 = most contrastive, fg-4 = least -->
    <text x="20" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" letter-spacing="1">FOREGROUND SHADES (1=MOST CONTRASTIVE, 4=LEAST)</text>
    <rect x="20" y="54" width="12" height="12" rx="2" class="fg-1"/>
    <text x="38" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" class="fg-1">fg-1 - Headings, primary labels (most visible)</text>
    <rect x="20" y="74" width="12" height="12" rx="2" class="fg-2"/>
    <text x="38" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" class="fg-2">fg-2 - Card titles, stat numbers</text>
    <rect x="20" y="94" width="12" height="12" rx="2" class="fg-3"/>
    <text x="38" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="11" class="fg-3">fg-3 - Descriptions, sublabels</text>
    <rect x="20" y="114" width="12" height="12" rx="2" class="fg-4"/>
    <text x="38" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="fg-4">fg-4 - Metadata, tertiary (least visible, still readable)</text>

    <!-- Accent shades -->
    <text x="530" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" letter-spacing="1">ACCENT SHADES</text>
    <rect x="530" y="56" width="90" height="26" rx="6" fill="#0096d1"/>
    <text x="530" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="accent-1">accent-1: #0096d1</text>
    <rect x="650" y="56" width="90" height="26" rx="6" fill="#da8230"/>
    <text x="650" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="accent-2">accent-2: #da8230</text>

    <!-- Background fills -->
    <text x="530" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" letter-spacing="1">BACKGROUND FILLS</text>
    <rect x="530" y="120" width="90" height="14" rx="4" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1"/>
    <text x="540" y="131" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">bg-1 (0.06)</text>
    <rect x="650" y="120" width="90" height="14" rx="4" fill="#0096d1" opacity="0.3"/>
    <text x="660" y="131" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">bg-2 (0.3)</text>

    <!-- Stroke reference -->
    <text x="530" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3" letter-spacing="1">STROKE REF: #1278d1</text>
    <line x1="670" y1="144" x2="740" y2="144" stroke="#1278d1" stroke-width="2"/>
  </g>

  <!-- === SECTION 2: Light background strip === -->
  <g id="light-strip">
    <rect x="0" y="166" width="800" height="176" fill="#f5f7fa"/>
    <text x="20" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#236a74" letter-spacing="1">ON LIGHT BACKGROUND (#f5f7fa)</text>

    <!-- Card sample -->
    <g id="card-light">
      <path d="M20,196 H195 V297 Q195,300 192,300 H23 Q20,300 20,297 Z" fill="#0096d1" opacity="0.04"/>
      <path d="M20,196 H195 V297 Q195,300 192,300 H23 Q20,300 20,297 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="20" y="196" width="175" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="32" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#0096d1">EXTRACT</text>
      <text x="32" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1a5a6e">Entity Extraction</text>
      <text x="32" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#24697e">litellm + instructor</text>
      <text x="32" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#236a74">Pydantic structured output</text>
      <text x="32" y="282" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#2b7680">8 LLM call sites</text>
    </g>

    <!-- Stat sample -->
    <g id="stats-light">
      <text x="220" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a5a6e">1,007</text>
      <text x="220" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#236a74">Entities</text>
      <line x1="300" y1="204" x2="300" y2="236" stroke="#0096d1" stroke-width="1" opacity="0.3"/>
      <text x="320" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a5a6e">3,496</text>
      <text x="320" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#236a74">Relationships</text>
      <line x1="410" y1="204" x2="410" y2="236" stroke="#0096d1" stroke-width="1" opacity="0.3"/>
      <text x="430" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#da8230">88%</text>
      <text x="430" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#236a74">Hybrid Score</text>
    </g>

    <!-- Arrow samples -->
    <g id="arrows-light">
      <text x="560" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#236a74" letter-spacing="1">ARROWS</text>
      <!-- Straight horizontal: pipeline flow -->
      <line x1="560" y1="214" x2="620" y2="214" stroke="#0096d1" stroke-width="1.2" opacity="0.4"/>
      <polygon points="620,211 624,214 620,217" fill="#0096d1" opacity="0.6"/>
      <text x="640" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#24697e">pipeline flow</text>
      <!-- Straight horizontal: escalation -->
      <line x1="560" y1="234" x2="620" y2="234" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
      <polygon points="620,231 624,234 620,237" fill="#da8230" opacity="0.6"/>
      <text x="640" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#24697e">escalation</text>
      <!-- Chamfered L-route: angular routing (4px chamfer at bend) -->
      <path d="M560,254 H586 L590,258 V266" fill="none" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
      <polygon points="587,266 590,270 593,266" fill="#da8230" opacity="0.6"/>
      <text x="640" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#24697e">chamfered L-route</text>
      <text x="640" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#2b7680">4px chamfer, r=3 corners</text>
    </g>

    <!-- Icon stroke samples -->
    <g id="icons-light">
      <text x="560" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#236a74" letter-spacing="1">ICON STROKES</text>
      <circle cx="574" cy="310" r="6" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1.5"/>
      <circle cx="594" cy="302" r="4" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1.5"/>
      <line x1="579" y1="306" x2="590" y2="304" stroke="#0096d1" stroke-width="1"/>
      <circle cx="594" cy="318" r="4" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="1.5"/>
      <line x1="579" y1="314" x2="590" y2="316" stroke="#da8230" stroke-width="1"/>
      <rect x="620" y="300" width="40" height="6" rx="2" fill="#0096d1" fill-opacity="0.15"/>
      <rect x="620" y="310" width="30" height="6" rx="2" fill="#0096d1" fill-opacity="0.25"/>
      <rect x="620" y="320" width="50" height="6" rx="2" fill="#da8230" fill-opacity="0.2"/>
    </g>

    <!-- Coverage bar -->
    <g id="coverage-light">
      <text x="220" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#236a74" letter-spacing="1">COVERAGE BAR</text>
      <rect x="220" y="268" width="260" height="14" rx="4" fill="#0096d1" fill-opacity="0.08"/>
      <rect x="220" y="268" width="229" height="14" rx="4" fill="#0096d1"/>
      <text x="340" y="279" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#f5f7fa">88%</text>
    </g>

    <!-- Light mode note -->
    <text x="20" y="334" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2b7680">Light mode uses darker variants: fg-1=#1a5a6e fg-2=#24697e fg-3=#236a74 fg-4=#2b7680 | accent-1=#005f7a accent-2=#7a4a15</text>
  </g>

  <!-- === SECTION 3: Dark background strip === -->
  <g id="dark-strip">
    <rect x="0" y="342" width="800" height="186" fill="#1e1e1e"/>
    <text x="20" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#9ad4e2" letter-spacing="1">ON DARK BACKGROUND (#1e1e1e)</text>

    <!-- Card sample (dark) -->
    <g id="card-dark">
      <path d="M20,372 H195 V473 Q195,476 192,476 H23 Q20,476 20,473 Z" fill="#0096d1" opacity="0.08"/>
      <path d="M20,372 H195 V473 Q195,476 192,476 H23 Q20,476 20,473 Z" fill="none" stroke="#0096d1" stroke-width="1" opacity="0.5"/>
      <rect x="20" y="372" width="175" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="32" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#0096d1">EXTRACT</text>
      <text x="32" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#b8e4f0">Entity Extraction</text>
      <text x="32" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8fd4e6">litellm + instructor</text>
      <text x="32" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5aafc5">Pydantic structured output</text>
      <text x="32" y="458" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4099b3">8 LLM call sites</text>
    </g>

    <!-- Stat sample (dark) -->
    <g id="stats-dark">
      <text x="220" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#b8e4f0">1,007</text>
      <text x="220" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#5aafc5">Entities</text>
      <line x1="300" y1="380" x2="300" y2="412" stroke="#0096d1" stroke-width="1" opacity="0.3"/>
      <text x="320" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#b8e4f0">3,496</text>
      <text x="320" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#5aafc5">Relationships</text>
      <line x1="410" y1="380" x2="410" y2="412" stroke="#0096d1" stroke-width="1" opacity="0.3"/>
      <text x="430" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#da8230">88%</text>
      <text x="430" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#5aafc5">Hybrid Score</text>
    </g>

    <!-- Arrow samples (dark) -->
    <g id="arrows-dark">
      <text x="560" y="376" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#9ad4e2" letter-spacing="1">ARROWS</text>
      <!-- Straight horizontal: pipeline flow -->
      <line x1="560" y1="390" x2="620" y2="390" stroke="#0096d1" stroke-width="1.2" opacity="0.4"/>
      <polygon points="620,387 624,390 620,393" fill="#0096d1" opacity="0.6"/>
      <text x="640" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8fd4e6">pipeline flow</text>
      <!-- Straight horizontal: escalation -->
      <line x1="560" y1="410" x2="620" y2="410" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
      <polygon points="620,407 624,410 620,413" fill="#da8230" opacity="0.6"/>
      <text x="640" y="414" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8fd4e6">escalation</text>
      <!-- Chamfered L-route: angular routing (4px chamfer at bend) -->
      <path d="M560,430 H586 L590,434 V442" fill="none" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
      <polygon points="587,442 590,446 593,442" fill="#da8230" opacity="0.6"/>
      <text x="640" y="434" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8fd4e6">chamfered L-route</text>
      <text x="640" y="446" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#4099b3">4px chamfer, r=3 corners</text>
    </g>

    <!-- Icon stroke samples (dark) -->
    <g id="icons-dark">
      <text x="560" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#9ad4e2" letter-spacing="1">ICON STROKES</text>
      <circle cx="574" cy="486" r="6" fill="#0096d1" fill-opacity="0.1" stroke="#0096d1" stroke-width="1.5"/>
      <circle cx="594" cy="478" r="4" fill="#0096d1" fill-opacity="0.1" stroke="#0096d1" stroke-width="1.5"/>
      <line x1="579" y1="482" x2="590" y2="480" stroke="#0096d1" stroke-width="1"/>
      <circle cx="594" cy="494" r="4" fill="#da8230" fill-opacity="0.1" stroke="#da8230" stroke-width="1.5"/>
      <line x1="579" y1="490" x2="590" y2="492" stroke="#da8230" stroke-width="1"/>
      <rect x="620" y="476" width="40" height="6" rx="2" fill="#0096d1" fill-opacity="0.3"/>
      <rect x="620" y="486" width="30" height="6" rx="2" fill="#0096d1" fill-opacity="0.4"/>
      <rect x="620" y="496" width="50" height="6" rx="2" fill="#da8230" fill-opacity="0.3"/>
    </g>

    <!-- Coverage bar (dark) -->
    <g id="coverage-dark">
      <text x="220" y="436" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#9ad4e2" letter-spacing="1">COVERAGE BAR</text>
      <rect x="220" y="444" width="260" height="14" rx="4" fill="#0096d1" fill-opacity="0.12"/>
      <rect x="220" y="444" width="229" height="14" rx="4" fill="#0096d1"/>
      <text x="340" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0f2f7">88%</text>
    </g>

    <!-- Dark mode note -->
    <text x="20" y="514" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#4099b3">Dark mode uses CSS classes: fg-1=#b8e4f0 fg-2=#8fd4e6 fg-3=#5aafc5 fg-4=#4099b3 | accent-1=#5cc8e0 accent-2=#d4a04a</text>
  </g>

</svg>
