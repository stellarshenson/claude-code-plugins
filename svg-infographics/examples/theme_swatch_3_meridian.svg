<!--
  theme_swatch.svg - Meridian brand palette validation swatch
  Shows: all shade grades (fg-1 to fg-4, accent-1/2, bg-1/2) demonstrated across
  two background strips (light #f5f7fa, dark #1a2332) to validate readability on
  any document background. Includes text samples at all sizes, card fills, timeline
  segment, arrow samples, icon strokes, and accent swatches.
  Intent: human validation of the complete palette before producing deliverable SVGs.
  Theme: Meridian palette with numbered shade grades.

  === COLOUR RULES ===

  PRIMARY PALETTE (Meridian blue - use for most elements):
  - fg-1: #1a4d94  (headings, primary labels - darkest)
  - fg-2: #2a5f9e  (card titles, stat numbers)
  - fg-3: #4a7ba7  (descriptions, sublabels)
  - fg-4: #6b8db5  (metadata, tertiary - lightest)
  - accent-1: #00a6ff  (primary accent - cards, bars, containers, arrows)
  - accent-2: #66ccff  (secondary accent - lighter elements, secondary cards)

  DARK MODE (CSS prefers-color-scheme: dark):
  - fg-1: #a8d4f0 | fg-2: #7ec0e6 | fg-3: #5aafc5 | fg-4: #4099b3
  - accent-1: #4dc4ff | accent-2: #88ddff
  - Note: fg-1/fg-2 light-mode values FAIL on dark backgrounds - always use CSS classes

  TEAL ACCENT (use sparingly for emphasis, not as replacement for blue):
  - #0096a6 - structural fills, active/highlighted elements
  - #008090 - deeper teal for panel headers
  - Use for: active path in flows, current-state highlights, step headers
  - Do NOT use for: containers, inactive elements, background bars (keep blue)

  AMBER ACCENT (use for distinct callouts - targets, results, new proposals):
  - #d4872a - target nodes, proposed enhancements, warm highlights
  - Use for: target/result indicators, "new" labels, emphasis distinct from blue/teal

  RED (use only for risk/fragile zones):
  - #c44 - fragile zones, threshold risk, error states
  - Use at low opacity (0.03-0.06 fill, 0.4-0.8 stroke)

  HIERARCHY: Blue is the foundation. Teal accents specific elements within blue.
  Amber marks targets and proposals. Red marks risk. A graphic should be mostly blue
  with teal, amber, and red appearing only where they add meaning.

  === END COLOUR RULES ===
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">

  <!-- === SECTION 1: Palette Reference (transparent bg) === -->
  <text x="20" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#6b8db5" letter-spacing="1">MERIDIAN THEME SWATCH</text>
  <line x1="20" y1="26" x2="780" y2="26" stroke="#6b8db5" stroke-width="0.5" opacity="0.3"/>

  <!-- Foreground shades -->
  <text x="20" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">FOREGROUND SHADES</text>
  <rect x="20" y="54" width="12" height="12" rx="2" fill="#1a4d94"/>
  <text x="38" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1a4d94">fg-1: #1a4d94 - Headings, primary labels (darkest)</text>
  <rect x="20" y="74" width="12" height="12" rx="2" fill="#2a5f9e"/>
  <text x="38" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#2a5f9e">fg-2: #2a5f9e - Card titles, stat numbers, secondary headings</text>
  <rect x="20" y="94" width="12" height="12" rx="2" fill="#4a7ba7"/>
  <text x="38" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a7ba7">fg-3: #4a7ba7 - Descriptions, sublabels</text>
  <rect x="20" y="114" width="12" height="12" rx="2" fill="#6b8db5"/>
  <text x="38" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b8db5">fg-4: #6b8db5 - Metadata, tertiary text (lightest)</text>

  <!-- Accent shades -->
  <text x="530" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">ACCENT SHADES</text>
  <rect x="530" y="56" width="90" height="26" rx="6" fill="#00a6ff"/>
  <text x="530" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2a5f9e">accent-1: #00a6ff</text>
  <rect x="650" y="56" width="90" height="26" rx="6" fill="#66ccff"/>
  <text x="650" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2a5f9e">accent-2: #66ccff</text>

  <!-- Background shades -->
  <text x="530" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">BACKGROUND FILLS</text>
  <rect x="530" y="120" width="90" height="14" rx="4" fill="#00a6ff" fill-opacity="0.06" stroke="#00a6ff" stroke-width="1"/>
  <text x="540" y="131" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#4a7ba7">bg-1 (0.06)</text>
  <rect x="650" y="120" width="90" height="14" rx="4" fill="#00a6ff" opacity="0.3"/>
  <text x="660" y="131" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#4a7ba7">bg-2 (0.3)</text>

  <!-- === SECTION 2: Light background strip (+24px gap) === -->
  <rect x="0" y="166" width="800" height="160" fill="#f5f7fa"/>
  <text x="20" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">ON LIGHT BACKGROUND (#f5f7fa)</text>

  <!-- Card sample -->
  <path d="M20,202 H195 V292 Q195,302 185,302 H30 Q20,302 20,292 Z" fill="#00a6ff" opacity="0.04"/>
  <path d="M20,202 H195 V292 Q195,302 185,302 H30 Q20,302 20,292 Z" fill="none" stroke="#00a6ff" stroke-width="1"/>
  <rect x="20" y="202" width="175" height="5" fill="#00a6ff" opacity="0.6"/>
  <text x="32" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#00a6ff">MODULE 1</text>
  <text x="32" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#4a7ba7">Card Title (fg-3)</text>
  <text x="32" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b8db5">Description text (fg-4)</text>
  <text x="32" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b8db5">Second line of metadata</text>
  <!-- Lucide shield-check icon sample -->
  <g transform="translate(155, 210) scale(0.667)" fill="none" stroke="#00a6ff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" opacity="0.5">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
    <path d="m9 12 2 2 4-4"/>
  </g>

  <!-- Stat banner sample -->
  <text x="220" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#2a5f9e">38</text>
  <text x="220" y="234" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b8db5">Countries</text>
  <line x1="270" y1="206" x2="270" y2="238" stroke="#00a6ff" stroke-width="1" opacity="0.3"/>
  <text x="290" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#2a5f9e">4,421</text>
  <text x="290" y="234" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b8db5">Employees</text>
  <line x1="370" y1="206" x2="370" y2="238" stroke="#00a6ff" stroke-width="1" opacity="0.3"/>
  <text x="390" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#2a5f9e">25.8%</text>
  <text x="390" y="234" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b8db5">Female</text>

  <!-- Timeline sample with cutouts -->
  <text x="220" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">TIMELINE SAMPLE</text>
  <line x1="220" y1="292" x2="300" y2="292" stroke="#00a6ff" stroke-width="3" opacity="0.3"/>
  <line x1="340" y1="292" x2="440" y2="292" stroke="#00a6ff" stroke-width="3" opacity="0.3"/>
  <line x1="480" y1="292" x2="560" y2="292" stroke="#00a6ff" stroke-width="3" opacity="0.3"/>
  <circle cx="320" cy="292" r="16" fill="#00a6ff" fill-opacity="0.06" stroke="#00a6ff" stroke-width="2"/>
  <circle cx="460" cy="292" r="16" fill="#66ccff" fill-opacity="0.06" stroke="#66ccff" stroke-width="2"/>
  <text x="320" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#00a6ff" text-anchor="middle">2026</text>
  <text x="460" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#66ccff" text-anchor="middle">2031</text>

  <!-- Arrow samples -->
  <text x="590" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">ARROWS</text>
  <!-- Straight -->
  <g transform="translate(660, 214) rotate(0)">
    <line x1="-50" y1="0" x2="0" y2="0" stroke="#00a6ff" stroke-width="2" opacity="0.3"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#00a6ff" opacity="0.8"/>
  </g>
  <!-- Angled up -->
  <g transform="translate(660, 244) rotate(-30)">
    <line x1="-50" y1="0" x2="0" y2="0" stroke="#00a6ff" stroke-width="2" opacity="0.3"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#00a6ff" opacity="0.8"/>
  </g>
  <!-- Angled down -->
  <g transform="translate(660, 274) rotate(30)">
    <line x1="-50" y1="0" x2="0" y2="0" stroke="#66ccff" stroke-width="2" opacity="0.3"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#66ccff" opacity="0.8"/>
  </g>

  <!-- Coverage bar sample -->
  <rect x="590" y="294" width="180" height="14" rx="7" fill="#6b8db5" opacity="0.15"/>
  <rect x="590" y="294" width="140" height="14" rx="7" fill="#00a6ff" opacity="0.8"/>
  <text x="600" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#ffffff">89%</text>
  <text x="740" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5">11%</text>

  <!-- === SECTION 3: Dark background strip (+24px gap) === -->
  <rect x="0" y="350" width="800" height="210" fill="#1a2332"/>
  <text x="20" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">ON DARK BACKGROUND (#1a2332)</text>

  <!-- Card sample on dark -->
  <path d="M20,380 H195 V494 Q195,502 185,502 H30 Q20,502 20,494 Z" fill="#00a6ff" opacity="0.08"/>
  <path d="M20,380 H195 V494 Q195,502 185,502 H30 Q20,502 20,494 Z" fill="none" stroke="#00a6ff" stroke-width="1"/>
  <rect x="20" y="380" width="175" height="5" fill="#00a6ff" opacity="0.6"/>
  <text x="32" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#00a6ff">MODULE 1</text>
  <text x="32" y="416" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1a4d94">fg-1 on dark (FAIL?)</text>
  <text x="32" y="432" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#2a5f9e">fg-2 on dark</text>
  <text x="32" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a7ba7">fg-3 on dark</text>
  <text x="32" y="464" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b8db5">fg-4 on dark</text>
  <text x="32" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#66ccff">accent-2 as text on dark</text>

  <!-- Stats on dark bg (accent colour shown via number fill, not separate label) -->
  <text x="220" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#00a6ff">38</text>
  <text x="220" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b8db5">Countries</text>
  <line x1="270" y1="384" x2="270" y2="416" stroke="#00a6ff" stroke-width="1" opacity="0.5"/>
  <text x="290" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#66ccff">4,421</text>
  <text x="290" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b8db5">Employees</text>

  <!-- Timeline on dark bg (shifted down 24px from stats) -->
  <line x1="220" y1="460" x2="300" y2="460" stroke="#00a6ff" stroke-width="3" opacity="0.4"/>
  <line x1="340" y1="460" x2="440" y2="460" stroke="#00a6ff" stroke-width="3" opacity="0.4"/>
  <line x1="480" y1="460" x2="560" y2="460" stroke="#00a6ff" stroke-width="3" opacity="0.4"/>
  <circle cx="320" cy="460" r="16" fill="#00a6ff" fill-opacity="0.12" stroke="#00a6ff" stroke-width="2"/>
  <circle cx="460" cy="460" r="16" fill="#66ccff" fill-opacity="0.12" stroke="#66ccff" stroke-width="2"/>
  <text x="320" y="436" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#00a6ff" text-anchor="middle">2026</text>
  <text x="460" y="436" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#66ccff" text-anchor="middle">2031</text>

  <!-- Arrows on dark bg -->
  <g transform="translate(660, 396) rotate(0)">
    <line x1="-50" y1="0" x2="0" y2="0" stroke="#00a6ff" stroke-width="2" opacity="0.4"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#00a6ff" opacity="0.9"/>
  </g>
  <g transform="translate(660, 426) rotate(-30)">
    <line x1="-50" y1="0" x2="0" y2="0" stroke="#66ccff" stroke-width="2" opacity="0.4"/>
    <polygon points="0,0 -10,-5 -10,5" fill="#66ccff" opacity="0.9"/>
  </g>

  <!-- Coverage bar on dark bg -->
  <rect x="590" y="488" width="180" height="14" rx="7" fill="#6b8db5" opacity="0.2"/>
  <rect x="590" y="488" width="140" height="14" rx="7" fill="#00a6ff" opacity="0.8"/>
  <text x="600" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#ffffff">89%</text>
  <text x="740" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5">11%</text>

  <!-- Icon comparison on dark bg -->
  <text x="590" y="520" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#6b8db5" letter-spacing="1">ICON STROKES</text>
  <g transform="translate(596, 526) scale(0.667)" fill="none" stroke="#00a6ff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
    <path d="m9 12 2 2 4-4"/>
  </g>
  <g transform="translate(626, 526) scale(0.667)" fill="none" stroke="#66ccff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16h8"/><path d="M7 11h12"/><path d="M7 6h3"/>
  </g>
  <g transform="translate(656, 526) scale(0.667)" fill="none" stroke="#4a7ba7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/>
    <path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
  </g>
  <g transform="translate(686, 526) scale(0.667)" fill="none" stroke="#6b8db5" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/>
  </g>
</svg>
