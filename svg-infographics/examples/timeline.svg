  <circle cx="660" cy="55" r="18" fill="#66ccff" fill-opacity="0.06" stroke="#66ccff" stroke-width="2"/>
  <!-- Icon: expand (Lucide, ISC license) -->
  <g transform="translate(653, 48) scale(0.583)" fill="none" stroke="#66ccff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="m15 15 6 6"/><path d="m15 9 6-6"/><path d="M21 16v5h-5"/><path d="M21 8V3h-5"/>
    <path d="M3 16v5h5"/><path d="m3 21 6-6"/><path d="M3 8V3h5"/><path d="M9 9 3 3"/>
  </g>
  <text x="660" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#66ccff" text-anchor="middle">Jun 2031</text>
  <text x="660" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4a7ba7" text-anchor="middle">Threshold lowers</text>
  <text x="660" y="101" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4a7ba7" text-anchor="middle">to 100+ employees</text>
