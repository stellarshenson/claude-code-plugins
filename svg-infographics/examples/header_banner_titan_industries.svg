<!--
  header_banner.svg - Titan Industries Agentic Advisor presentation header
  Theme: Kolomolo palette (fg-1 #1f0f4a, fg-2 #42346e, fg-3 #70658a, accent gradient).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <style>
    .fg-1 { fill: #1f0f4a; }
    .fg-2 { fill: #42346e; }
    .fg-3 { fill: #70658a; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #eee7ff; }
      .fg-2 { fill: #ded2fd; }
      .fg-3 { fill: #b5b0c0; }
    }
  </style>
  <defs>
    <linearGradient id="kol_bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#1cd77f"/>
      <stop offset=".18" stop-color="#1687fd"/>
      <stop offset=".37" stop-color="#383af3"/>
      <stop offset=".58" stop-color="#d840a5"/>
      <stop offset=".79" stop-color="#ec7858"/>
      <stop offset="1" stop-color="#f2c036"/>
    </linearGradient>
    <linearGradient id="kol_rainbow" x1="3.89" y1="-22.53" x2="315.53" y2="90.49" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1cd77f"/>
      <stop offset=".18" stop-color="#1687fd"/>
      <stop offset=".37" stop-color="#383af3"/>
      <stop offset=".58" stop-color="#d840a5"/>
      <stop offset=".79" stop-color="#ec7858"/>
      <stop offset="1" stop-color="#f2c036"/>
    </linearGradient>
  </defs>

  <!-- Bottom accent gradient bar -->
  <rect x="0" y="110" width="800" height="10" fill="url(#kol_bar)" opacity="0.6"/>

  <!-- Title -->
  <text x="40" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" class="fg-1">Agentic Advisor</text>
  <text x="40" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" class="fg-2">Intelligent Knowledge Retrieval for Titan Industries</text>

  <!-- Subtitle -->
  <text x="40" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="11" class="fg-3">Multi-source AI system with human-in-the-loop workflows</text>

  <!-- Credits -->
  <text x="40" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#909090">Prepared by Kolomolo | March 2026 | v17</text>

