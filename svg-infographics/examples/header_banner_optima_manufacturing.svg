<!--
  header_banner.svg - Project proposal title page header for Optima Manufacturing AB
  Shows: main title (Manufacturing Tracking and Quality Control), subtitle (Optima Manufacturing AB),
  team credits (Kolomolo LTD with initials), bottom accent gradient bar.
  Kolomolo "K" logo embedded as watermark (35% opacity, top-right).
  Optima Manufacturing wordmark in brand red (left-aligned with title).
  Intent: first visual element in the proposal document, sets brand tone.
  Theme: Optima Manufacturing palette (fg-1 #8b1a2b title, fg-3 #c45565 subtitle, fg-4 #d4848e credits, accent #E61C29).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="pf-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b1a2b"/>
      <stop offset="100%" style="stop-color:#c45565"/>
    </linearGradient>
    <linearGradient id="pf-kol-grad" x1="0" y1="1.33" x2="87.13" y2="163.58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1CD77F"/>
      <stop offset="0.229" stop-color="#1687FD"/>
      <stop offset="0.404" stop-color="#383AF3"/>
      <stop offset="0.6" stop-color="#D840A5"/>
      <stop offset="0.8" stop-color="#EC7858"/>
      <stop offset="1" stop-color="#F2C036"/>
    </linearGradient>
  </defs>

  <!-- Bottom accent gradient bar -->
  <rect x="0" y="170" width="800" height="10" fill="url(#pf-accent)" opacity="0.6"/>

  <!-- Optima Manufacturing wordmark -->
  <text x="40" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#8b1a2b" letter-spacing="3">OPTIMA MANUFACTURING AB</text>

  <!-- Main title -->
  <text x="40" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#8b1a2b">Manufacturing Tracking</text>
  <text x="40" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#8b1a2b">and Quality Control</text>

  <!-- Subtitle -->
  <text x="40" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#707070">Project Proposal for Optima Manufacturing AB</text>

  <!-- Credits -->
  <text x="40" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#909090">Prepared by Kolomolo LTD (K. Jelen, N. Braniewska, A. Gibes, M. Baron) | March 2026</text>

  <!-- Decorative CNC/manufacturing icons in accent tones -->
  <!-- Gear icon -->
  <circle cx="620" cy="70" r="18" fill="none" stroke="#8b1a2b" stroke-width="1.2" opacity="0.12"/>
  <circle cx="620" cy="70" r="8" fill="none" stroke="#8b1a2b" stroke-width="1.2" opacity="0.12"/>
  <line x1="620" y1="48" x2="620" y2="52" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="620" y1="88" x2="620" y2="92" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="598" y1="70" x2="602" y2="70" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="638" y1="70" x2="642" y2="70" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="607" y1="57" x2="610" y2="60" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="630" y1="80" x2="633" y2="83" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="633" y1="57" x2="630" y2="60" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>
  <line x1="610" y1="80" x2="607" y2="83" stroke="#8b1a2b" stroke-width="2" opacity="0.12"/>

  <!-- NFC/tracking tag icon -->
  <rect x="660" y="100" width="22" height="16" rx="3" fill="none" stroke="#8b1a2b" stroke-width="1" opacity="0.12"/>
  <circle cx="668" cy="108" r="2" fill="#8b1a2b" opacity="0.12"/>
  <path d="M674,104 Q680,108 674,112" fill="none" stroke="#8b1a2b" stroke-width="0.8" opacity="0.12"/>
  <path d="M677,101 Q685,108 677,115" fill="none" stroke="#8b1a2b" stroke-width="0.8" opacity="0.12"/>

  <!-- Measurement caliper icon -->
  <line x1="580" y1="110" x2="640" y2="110" stroke="#8b1a2b" stroke-width="1" opacity="0.10"/>
  <line x1="580" y1="105" x2="580" y2="115" stroke="#8b1a2b" stroke-width="1" opacity="0.10"/>
  <line x1="640" y1="105" x2="640" y2="115" stroke="#8b1a2b" stroke-width="1" opacity="0.10"/>
  <line x1="595" y1="108" x2="595" y2="112" stroke="#8b1a2b" stroke-width="0.5" opacity="0.10"/>
  <line x1="610" y1="107" x2="610" y2="113" stroke="#8b1a2b" stroke-width="0.5" opacity="0.10"/>
  <line x1="625" y1="108" x2="625" y2="112" stroke="#8b1a2b" stroke-width="0.5" opacity="0.10"/>

  <!-- Kolomolo "K" logo watermark -->
  <g transform="translate(730, 15) scale(1.4)" opacity="0.35">
    <path d="m 3.561,35.248 c -1.475,0 -2.677,-1.223 -2.677,-2.715 V 1.491 c 0,-0.654 0.516,-1.18 1.149,-1.18 h 4.636 c 0.632,0 1.159,0.526 1.159,1.18 V 22.007 c 0,0 11.191,-11.245 12.508,-12.533 5.153,-5.075 10.084,-7.897 14.5,-7.897 0.569,0 2.023,0 2.539,0 1.296,0 1.201,1.202 1.201,1.202 l -0.031,4.71 c 0,0.633 -0.506,1.159 -1.138,1.159 -0.4,0 -1.981,0 -2.561,0 -1.159,0 -4.426,0.569 -9.589,5.816 -3.33,3.391 -4.879,4.968 -5.817,5.73 L 5.447,34.444 c -0.506,0.515 -1.17,0.794 -1.876,0.794 z" fill="url(#pf-kol-grad)"/>
    <path d="M 30.243,48.693 19.726,37.309 c -3.836,3.82 -7.208,7.189 -7.787,7.779 0,0 -3.804,4.196 -7.597,4.196 H 1.159 C 0.527,49.283 0,48.758 0,48.103 V 43.382 C 0,42.727 0.516,42.202 1.159,42.202 H 4.363 c 0.369,-0.011 1.58,-0.837 2.402,-1.824 0,0 17.008,-17.061 20.432,-20.183 3.267,-2.972 5.954,-3.595 7.64,-3.605 0.242,0 2.645,0 2.645,0 0.632,0 1.149,0.526 1.149,1.18 l -0.021,4.721 c -0.011,0.665 -0.516,1.17 -1.149,1.17 h -2.613 c 0,0 -1.075,0.032 -3.014,1.803 -1.064,0.966 -3.456,3.283 -7.102,6.889 l 13.72,14.936 c 0.316,0.343 0.4,0.837 0.221,1.277 -0.179,0.429 -0.601,0.708 -1.064,0.708 h -6.006 c -0.506,0 -0.991,-0.215 -1.338,-0.59 z" fill="url(#pf-kol-grad)"/>
  </g>
</svg>
