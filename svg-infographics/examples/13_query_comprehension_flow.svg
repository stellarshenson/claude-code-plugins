<!--
  13_query_comprehension_flow.svg - How raw queries get transformed
  Shows: 3 real-world query examples flowing through comprehension stages
  Theme: Meridian enriched - teal/amber/red
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .fg-1 { fill: #1a4d94; } .fg-2 { fill: #2a5f9e; } .fg-3 { fill: #4a7ba7; } .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #007a8a; } .accent-2 { fill: #9a6a1a; }
    .semantic-new { fill: #b87820; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #a8d4f0; } .fg-2 { fill: #7ec0e6; } .fg-3 { fill: #5aafc5; } .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #40c4d4; } .accent-2 { fill: #d4a04a; }
      .semantic-new { fill: #e0a848; }
    }
  </style>

  <text x="400" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">QUERY COMPREHENSION - TRANSFORMATION EXAMPLES</text>

  <!-- Column headers -->
  <text x="110" y="44" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Raw User Query</text>
  <text x="370" y="44" class="semantic-new" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Comprehension Steps</text>
  <text x="660" y="44" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Enhanced Query</text>

  <!-- ═══ Example 1: Informal language + error code ═══ -->
  <!-- Raw -->
  <g>
    <path d="M20,60 H200 V137 Q200,140 197,140 H23 Q20,140 20,137 Z" fill="#c44" fill-opacity="0.03"/>
    <path d="M20,60 H200 V137 Q200,140 197,140 H23 Q20,140 20,137 Z" fill="none" stroke="#c44" stroke-width="0.8"/>
    <rect x="20" y="60" width="180" height="4" fill="#c44" opacity="0.4"/>
    <text x="110" y="82" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">"the milking thing</text>
    <text x="110" y="96" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">keeps showing 3:14"</text>
    <text x="110" y="120" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">Informal language</text>
    <text x="110" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">Embedded error code</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="100" x2="218" y2="100" stroke="#d4872a" stroke-width="1.2" opacity="0.5"/>
  <polygon points="218,97 222,100 218,103" fill="#d4872a" opacity="0.6"/>

  <!-- Steps -->
  <g>
    <path d="M222,60 H518 V137 Q518,140 515,140 H225 Q222,140 222,137 Z" fill="#d4872a" fill-opacity="0.04"/>
    <path d="M222,60 H518 V137 Q518,140 515,140 H225 Q222,140 222,137 Z" fill="none" stroke="#d4872a" stroke-width="0.8"/>
    <rect x="222" y="60" width="296" height="4" fill="#d4872a" opacity="0.4"/>
    <text x="238" y="82" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"milking thing" -> resolve to product: VMS milking system</text>
    <text x="238" y="98" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"3:14" -> recognize as error code pattern (major:minor)</text>
    <text x="238" y="114" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"keeps showing" -> intent: recurring error, troubleshooting</text>
    <text x="238" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Extract: product=VMS, type=error_code, code=3:14, intent=troubleshoot</text>
  </g>

  <!-- Arrow -->
  <line x1="518" y1="100" x2="536" y2="100" stroke="#0096a6" stroke-width="1.2" opacity="0.5"/>
  <polygon points="536,97 540,100 536,103" fill="#0096a6" opacity="0.6"/>

  <!-- Enhanced -->
  <g>
    <path d="M540,60 H780 V137 Q780,140 777,140 H543 Q540,140 540,137 Z" fill="#0096a6" fill-opacity="0.04"/>
    <path d="M540,60 H780 V137 Q780,140 777,140 H543 Q540,140 540,137 Z" fill="none" stroke="#0096a6" stroke-width="1"/>
    <rect x="540" y="60" width="240" height="5" fill="#0096a6" opacity="0.6"/>
    <text x="660" y="84" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">"VMS milking system</text>
    <text x="660" y="98" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">error code 3:14</text>
    <text x="660" y="112" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">troubleshooting"</text>
    <text x="660" y="132" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">product_filter: VMS V300</text>
  </g>

  <!-- ═══ Example 2: Part number lookup ═══ -->
  <!-- Raw -->
  <g>
    <path d="M20,158 H200 V235 Q200,238 197,238 H23 Q20,238 20,235 Z" fill="#c44" fill-opacity="0.03"/>
    <path d="M20,158 H200 V235 Q200,238 197,238 H23 Q20,238 20,235 Z" fill="none" stroke="#c44" stroke-width="0.8"/>
    <rect x="20" y="158" width="180" height="4" fill="#c44" opacity="0.4"/>
    <text x="110" y="182" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">"I need to replace</text>
    <text x="110" y="196" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">the rubber part on</text>
    <text x="110" y="210" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">the teat cup"</text>
    <text x="110" y="230" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">Vague component reference</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="198" x2="218" y2="198" stroke="#d4872a" stroke-width="1.2" opacity="0.5"/>
  <polygon points="218,195 222,198 218,201" fill="#d4872a" opacity="0.6"/>

  <!-- Steps -->
  <g>
    <path d="M222,158 H518 V235 Q518,238 515,238 H225 Q222,238 222,235 Z" fill="#d4872a" fill-opacity="0.04"/>
    <path d="M222,158 H518 V235 Q518,238 515,238 H225 Q222,238 222,235 Z" fill="none" stroke="#d4872a" stroke-width="0.8"/>
    <rect x="222" y="158" width="296" height="4" fill="#d4872a" opacity="0.4"/>
    <text x="238" y="180" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"rubber part on teat cup" -> resolve: teat cup liner</text>
    <text x="238" y="196" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"replace" -> intent: parts lookup, replacement procedure</text>
    <text x="238" y="212" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Decompose: (1) identify part (2) find article number</text>
    <text x="238" y="230" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Extract: component=teat_cup_liner, intent=parts_lookup+procedure</text>
  </g>

  <!-- Arrow -->
  <line x1="518" y1="198" x2="536" y2="198" stroke="#0096a6" stroke-width="1.2" opacity="0.5"/>
  <polygon points="536,195 540,198 536,201" fill="#0096a6" opacity="0.6"/>

  <!-- Enhanced -->
  <g>
    <path d="M540,158 H780 V235 Q780,238 777,238 H543 Q540,238 540,235 Z" fill="#0096a6" fill-opacity="0.04"/>
    <path d="M540,158 H780 V235 Q780,238 777,238 H543 Q540,238 540,235 Z" fill="none" stroke="#0096a6" stroke-width="1"/>
    <rect x="540" y="158" width="240" height="5" fill="#0096a6" opacity="0.6"/>
    <text x="660" y="182" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Sub-query 1: "teat cup liner</text>
    <text x="660" y="196" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">article number replacement"</text>
    <text x="660" y="216" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Sub-query 2: "teat cup liner</text>
    <text x="660" y="230" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">replacement procedure"</text>
  </g>

  <!-- ═══ Example 3: Multi-language ═══ -->
  <!-- Raw -->
  <g>
    <path d="M20,256 H200 V333 Q200,336 197,336 H23 Q20,336 20,333 Z" fill="#c44" fill-opacity="0.03"/>
    <path d="M20,256 H200 V333 Q200,336 197,336 H23 Q20,336 20,333 Z" fill="none" stroke="#c44" stroke-width="0.8"/>
    <rect x="20" y="256" width="180" height="4" fill="#c44" opacity="0.4"/>
    <text x="110" y="280" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">"tanken rengor</text>
    <text x="110" y="294" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">inte ordentligt"</text>
    <text x="110" y="318" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">Swedish language</text>
    <text x="110" y="330" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">Technical context unclear</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="296" x2="218" y2="296" stroke="#d4872a" stroke-width="1.2" opacity="0.5"/>
  <polygon points="218,293 222,296 218,299" fill="#d4872a" opacity="0.6"/>

  <!-- Steps -->
  <g>
    <path d="M222,256 H518 V333 Q518,336 515,336 H225 Q222,336 222,333 Z" fill="#d4872a" fill-opacity="0.04"/>
    <path d="M222,256 H518 V333 Q518,336 515,336 H225 Q222,336 222,333 Z" fill="none" stroke="#d4872a" stroke-width="0.8"/>
    <rect x="222" y="256" width="296" height="4" fill="#d4872a" opacity="0.4"/>
    <text x="238" y="278" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Detect language: Swedish</text>
    <text x="238" y="294" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Translate: "the tank does not clean properly"</text>
    <text x="238" y="310" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">"tank" in milking context -> cooling tank / bulk tank</text>
    <text x="238" y="328" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Extract: component=cooling_tank, issue=cleaning, lang=sv</text>
  </g>

  <!-- Arrow -->
  <line x1="518" y1="296" x2="536" y2="296" stroke="#0096a6" stroke-width="1.2" opacity="0.5"/>
  <polygon points="536,293 540,296 536,299" fill="#0096a6" opacity="0.6"/>

  <!-- Enhanced -->
  <g>
    <path d="M540,256 H780 V333 Q780,336 777,336 H543 Q540,336 540,333 Z" fill="#0096a6" fill-opacity="0.04"/>
    <path d="M540,256 H780 V333 Q780,336 777,336 H543 Q540,336 540,333 Z" fill="none" stroke="#0096a6" stroke-width="1"/>
    <rect x="540" y="256" width="240" height="5" fill="#0096a6" opacity="0.6"/>
    <text x="660" y="282" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">"cooling tank cleaning</text>
    <text x="660" y="296" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">troubleshooting"</text>
    <text x="660" y="318" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">respond_language: sv</text>
    <text x="660" y="330" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle">search_language: en (docs in English)</text>
  </g>

  <!-- Bottom note -->
  <path d="M20,350 H780 V387 Q780,390 777,390 H23 Q20,390 20,387 Z" fill="#d4872a" fill-opacity="0.02"/>
  <path d="M20,350 H780 V387 Q780,390 777,390 H23 Q20,390 20,387 Z" fill="none" stroke="#d4872a" stroke-width="0.8" opacity="0.25"/>
  <rect x="20" y="350" width="760" height="4" fill="#d4872a" opacity="0.15"/>
  <text x="400" y="374" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Query comprehension runs before retrieval - fixes the query rather than hoping retrieval compensates</text>
  <text x="400" y="388" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Each transformation is traceable. Enhanced queries and extracted entities are logged for debugging and benchmark analysis.</text>
</svg>
