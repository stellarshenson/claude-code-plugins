<!--
  llm_call_sites.svg - Nexus LLM engagement matrix as card grid
  Shows: 8 LLM call sites in a 4x2 grid, each card showing call site name,
  module path, call pattern (single-shot vs agent), volume indicator, and
  whether it converts to agent. Pipeline calls in cyan, agent escalation in orange.
  Intent: visualize the LLM engagement matrix from Section 2 of Nexus_DESIGN.md.
  Theme: Stellars-Tech derived - accent-1=#0096d1 pipeline, accent-2=#da8230 agents.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
    }
  </style>

  <g id="guide-grid" display="none">
    <line x1="400" y1="0" x2="400" y2="340" stroke="red" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="340" stroke="red" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="340" stroke="red" stroke-width="0.5"/>
  </g>

  <!-- === GRID REFERENCE ===
    viewBox: 800x340
    Card grid: 4 columns x 2 rows
    Card width: 182px, height: 120px
    H-gap: 12px, V-gap: 12px
    Left margin: 16px
    First row y=36, second row y=168
    Column x: 16, 210, 404, 598
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-stack: col1, col2, col3, col4 (4 cards per row)
    v-stack: row1, row2
    contain: each card > accent-bar, name, module, pattern, volume
  === -->

  <!-- Title -->
  <text x="400" y="16" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">LLM CALL SITES (8 TOTAL)</text>
  <text x="400" y="28" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Pipeline single-shot (cyan) vs Agent escalation (orange)</text>

  <!-- === ROW 1: PIPELINE SINGLE-SHOT CALLS === -->

  <!-- Card 1: Chunk Extraction -->
  <g id="card-extract">
    <path d="M16,36 H198 V153 Q198,156 195,156 H19 Q16,156 16,153 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M16,36 H198 V153 Q198,156 195,156 H19 Q16,156 16,153 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="16" y="36" width="182" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="30" y="58" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Chunk Extraction</text>
    <text x="30" y="72" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">LLM CALL</text>
    <text x="30" y="90" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Single-shot per chunk</text>
    <text x="30" y="104" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">ExtractionResponse model</text>
    <!-- Volume bar -->
    <rect x="30" y="114" width="140" height="6" rx="2" fill="#0096d1" fill-opacity="0.1"/>
    <rect x="30" y="114" width="140" height="6" rx="2" fill="#0096d1" opacity="0.4"/>
    <text x="30" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">High volume (N chunks)</text>
    <text x="160" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-1" text-anchor="end">KEEP</text>
  </g>

  <!-- Card 2: Schema Signals -->
  <g id="card-signals">
    <path d="M210,36 H392 V153 Q392,156 389,156 H213 Q210,156 210,153 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M210,36 H392 V153 Q392,156 389,156 H213 Q210,156 210,153 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="210" y="36" width="182" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="224" y="58" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Schema Signals</text>
    <text x="224" y="72" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">LLM CALL</text>
    <text x="224" y="90" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Single-shot per batch</text>
    <text x="224" y="104" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">SchemaSignals model</text>
    <!-- Volume bar -->
    <rect x="224" y="114" width="140" height="6" rx="2" fill="#0096d1" fill-opacity="0.1"/>
    <rect x="224" y="114" width="20" height="6" rx="2" fill="#0096d1" opacity="0.4"/>
    <text x="224" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (1 per run)</text>
    <text x="354" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-1" text-anchor="end">KEEP</text>
  </g>

  <!-- Card 3: Type Clustering -->
  <g id="card-cluster">
    <path d="M404,36 H586 V153 Q586,156 583,156 H407 Q404,156 404,153 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M404,36 H586 V153 Q586,156 583,156 H407 Q404,156 404,153 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="404" y="36" width="182" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="418" y="58" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Type Clustering</text>
    <text x="418" y="72" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">LLM CALL</text>
    <text x="418" y="90" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Single-shot per batch</text>
    <text x="418" y="104" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">TypeClusteringResult model</text>
    <!-- Volume bar -->
    <rect x="418" y="114" width="140" height="6" rx="2" fill="#0096d1" fill-opacity="0.1"/>
    <rect x="418" y="114" width="20" height="6" rx="2" fill="#0096d1" opacity="0.4"/>
    <text x="418" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (1 per run)</text>
    <text x="548" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-1" text-anchor="end">KEEP</text>
  </g>

  <!-- Card 4: Curing Probe -->
  <g id="card-probe">
    <path d="M598,36 H780 V153 Q780,156 777,156 H601 Q598,156 598,153 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M598,36 H780 V153 Q780,156 777,156 H601 Q598,156 598,153 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="598" y="36" width="182" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="612" y="58" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Curing Probe</text>
    <text x="612" y="72" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">STRANDS AGENT</text>
    <text x="612" y="90" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Two-phase with graph query</text>
    <text x="612" y="104" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">CureProbe + CureDecision</text>
    <!-- Volume bar -->
    <rect x="612" y="114" width="140" height="6" rx="2" fill="#0096d1" fill-opacity="0.1"/>
    <rect x="612" y="114" width="28" height="6" rx="2" fill="#0096d1" opacity="0.4"/>
    <text x="612" y="132" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (1-3 per run)</text>
    <text x="742" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-2" text-anchor="end">CONVERT</text>
  </g>

  <!-- === ROW 2: MIXED === -->

  <!-- Card 5: Curing Decision -->
  <g id="card-cure-decision">
    <path d="M16,168 H198 V285 Q198,288 195,288 H19 Q16,288 16,285 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M16,168 H198 V285 Q198,288 195,288 H19 Q16,288 16,285 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="16" y="168" width="182" height="5" fill="#da8230" opacity="0.6"/>
    <text x="30" y="190" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Curing Decision</text>
    <text x="30" y="204" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">STRANDS AGENT</text>
    <text x="30" y="222" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Needs graph evidence</text>
    <text x="30" y="236" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">CureDecision model</text>
    <!-- Volume bar -->
    <rect x="30" y="246" width="140" height="6" rx="2" fill="#da8230" fill-opacity="0.1"/>
    <rect x="30" y="246" width="28" height="6" rx="2" fill="#da8230" opacity="0.4"/>
    <text x="30" y="264" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (1-3 per run)</text>
    <text x="160" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-2" text-anchor="end">CONVERT</text>
  </g>

  <!-- Card 6: Recure Decision -->
  <g id="card-recure">
    <path d="M210,168 H392 V285 Q392,288 389,288 H213 Q210,288 210,285 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M210,168 H392 V285 Q392,288 389,288 H213 Q210,288 210,285 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="210" y="168" width="182" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="224" y="190" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Recure Decision</text>
    <text x="224" y="204" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">LLM CALL</text>
    <text x="224" y="222" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Remap rate timeline</text>
    <text x="224" y="236" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">RecureDecision model</text>
    <!-- Volume bar -->
    <rect x="224" y="246" width="140" height="6" rx="2" fill="#0096d1" fill-opacity="0.1"/>
    <rect x="224" y="246" width="14" height="6" rx="2" fill="#0096d1" opacity="0.4"/>
    <text x="224" y="264" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Very low (0-1 per run)</text>
    <text x="354" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-1" text-anchor="end">KEEP</text>
  </g>

  <!-- Card 7: Type Resolver -->
  <g id="card-type-resolve">
    <path d="M404,168 H586 V285 Q586,288 583,288 H407 Q404,288 404,285 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M404,168 H586 V285 Q586,288 583,288 H407 Q404,288 404,285 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="404" y="168" width="182" height="5" fill="#da8230" opacity="0.6"/>
    <text x="418" y="190" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Type Resolver</text>
    <text x="418" y="204" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">STRANDS AGENT</text>
    <text x="418" y="222" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Bayesian posterior gap &lt;0.15</text>
    <text x="418" y="236" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">TypeChoice model</text>
    <!-- Volume bar -->
    <rect x="418" y="246" width="140" height="6" rx="2" fill="#da8230" fill-opacity="0.1"/>
    <rect x="418" y="246" width="42" height="6" rx="2" fill="#da8230" opacity="0.4"/>
    <text x="418" y="264" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (2-10 per run)</text>
    <text x="548" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-2" text-anchor="end">CONVERT</text>
  </g>

  <!-- Card 8: Deferred Dedup -->
  <g id="card-deferred">
    <path d="M598,168 H780 V285 Q780,288 777,288 H601 Q598,288 598,285 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M598,168 H780 V285 Q780,288 777,288 H601 Q598,288 598,285 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="598" y="168" width="182" height="5" fill="#da8230" opacity="0.6"/>
    <text x="612" y="190" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Deferred Dedup</text>
    <text x="612" y="204" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="7" letter-spacing="1">STRANDS AGENT</text>
    <text x="612" y="222" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">Ambiguous zone 0.4-0.6</text>
    <text x="612" y="236" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="8">CrossTypeMergeDecision</text>
    <!-- Volume bar -->
    <rect x="612" y="246" width="140" height="6" rx="2" fill="#da8230" fill-opacity="0.1"/>
    <rect x="612" y="246" width="42" height="6" rx="2" fill="#da8230" opacity="0.4"/>
    <text x="612" y="264" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="7">Low volume (2-10 per run)</text>
    <text x="742" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="accent-2" text-anchor="end">CONVERT</text>
  </g>

  <!-- Summary stats -->
  <g id="summary">
    <rect x="16" y="302" width="8" height="8" rx="1" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1"/>
    <text x="30" y="310" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">4 LLM CALL (single-shot)</text>
    <rect x="200" y="302" width="8" height="8" rx="1" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="1"/>
    <text x="214" y="310" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600">4 STRANDS AGENT (escalation)</text>
    <text x="16" y="328" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">Volume bars show relative call frequency per ingestion run. CONVERT sites meet all 4 criteria: low volume, external evidence, hardcoded branching, measurable quality gap.</text>
  </g>

</svg>
