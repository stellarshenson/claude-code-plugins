<!--
  modules_overview.svg - 8-module scope of work card grid
  Shows: two rows of cards (4 top, 4 bottom) representing project deliverables.
  Row 1 (accent-1): Module 1 EU Regulatory Reporting, Module 2 Internal Reporting,
  Module 3 Self-Service & Analytics, Module 4 Cognitive Software.
  Row 2 (accent-2): Module 5 Power BI Dashboard, Module 6 Methodology Paper,
  Module 7 Executive Reporting, Module 8 Training & Handover.
  Cards use square-top/rounded-bottom paths with accent top bar and drop shadow.
  Lucide icons per card: shield-check, chart-bar, sliders-horizontal, bot,
  layout-dashboard, book-open, presentation, graduation-cap.
  Intent: visual breakdown of all deliverables for scope section of proposal.
  Theme: Meridian palette, fg-3 headings, fg-4 descriptions, bg-1 card fills.
-->
