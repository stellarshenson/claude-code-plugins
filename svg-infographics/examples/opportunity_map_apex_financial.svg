<!--
  opportunity_map.svg - Four opportunity areas as cards
  Theme: Kolomolo palette. Cards 1-2 include Pega pegasus mark.
  Icons: Lucide (ISC license) - shield-check, refresh-cw, cloud, brain

  GRID: 5px base grid for y-positions. x-positions use 12px card padding
  from card edges (x=22/220/418/616 are 2/0/2/1px off 5px grid -
  structural, consistent across all 4 cards).

  CARD LAYOUT (uniform):
    Card inner:     y=10 to y=100  (content boundary, on 5px grid)
    Card outer:     y=10 to y=110  (10px corner radius, on 5px grid)
    Accent bar:     y=10, height=5  (y=10-15)
    Title baseline: y=30
    Body text:      y=45, 55, 65, 75  (10px rhythm, on 5px grid)
    Bottom padding: 100 - 77 = 23px  (text bottom to card inner)

  INNER/OUTER BBOX PER ELEMENT TYPE:
    Padding rule: outer_bbox = inner_bbox + padding_per_type on all sides
    Icon/logo padding: 6px. Text padding: 12px from card edges, 4px from icons.
    Overlap check: outer bboxes must not overlap each other or extend past container inner bbox.

    Decorative icon (4x Lucide, uniform 20x20 inner, y=60-80, behind body text at 18% opacity):
      Card 1 shield-check: inner x=166-186 y=60-80,  outer x=160-192 y=54-86.  Card right=196 PASS (4px spare)
      Card 2 refresh-cw:   inner x=364-384 y=60-80,  outer x=358-390 y=54-86.  Card right=394 PASS (4px spare)
      Card 3 cloud:        inner x=562-582 y=60-80,  outer x=556-588 y=54-86.  Card right=592 PASS (4px spare)
      Card 4 brain:        inner x=760-780 y=60-80,  outer x=754-786 y=54-86.  Card right=790 PASS (4px spare)

    Pega mark (2x, uniform 20x9 inner, y=92):
      Card 1: inner x=166-186 y=92-101,  outer x=160-192 y=86-107.  Card right=196 PASS (4px). Card inner bottom=100, outer bottom=107 (extends into corner radius area). ACCEPTED: 30% opacity brand watermark.
      Card 2: inner x=364-384 y=92-101,  outer x=358-390 y=86-107.  Card right=394 PASS (4px). Same acceptance.
      Icon-to-pega gap: icon outer bottom=86, pega outer top=86. Flush (0px gap). Inner gap=92-80=12px.
-->
