    .decor { stroke: #1f0f4a; fill: #1f0f4a; }
    .decor-stroke { stroke: #1f0f4a; fill: none; }
    .pega-dark { fill: #1F2555; }
    .pega-teal { fill: #86CAC7; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #eee7ff; }
      .fg-2 { fill: #ded2fd; }
      .fg-3 { fill: #b5b0c0; }
      .decor { stroke: #eee7ff; fill: #eee7ff; }
      .decor-stroke { stroke: #eee7ff; }
      .pega-dark { fill: #b0bde0; }
      .pega-teal { fill: #a8e0dd; }
    }
  </style>

