<!--
  stats_banner.svg - Horizontal key metrics banner
  Shows: 5 stats separated by vertical lines - 38 countries (global operations),
  4,421 employees (total headcount), 25.8% female (gender ratio),
  5% threshold (EU compliance trigger), 7 modules (deliverable scope).
  Each stat has: hero number (fg-2), label (fg-4), explanatory subtext (fg-4).
  Intent: at-a-glance project scale summary, placed after header in proposal.
  Theme: Meridian palette, transparent background, accent-1 separator lines.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
  <!-- Stat 1 -->
  <text x="60" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#42346e" text-anchor="middle">38</text>
  <text x="60" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#70658a" text-anchor="middle">Countries</text>
  <text x="60" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#70658a" text-anchor="middle">Global operations</text>
  <line x1="130" y1="16" x2="130" y2="70" stroke="#5456f3" stroke-width="1" opacity="0.15"/>
  <!-- Stat 2 -->
  <text x="210" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#42346e" text-anchor="middle">4,421</text>
  <text x="210" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#70658a" text-anchor="middle">Employees</text>
  <text x="210" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#70658a" text-anchor="middle">Total headcount</text>
  <line x1="300" y1="16" x2="300" y2="70" stroke="#5456f3" stroke-width="1" opacity="0.15"/>
  <!-- Stat 3 -->
  <text x="380" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#42346e" text-anchor="middle">26%</text>
  <text x="380" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#70658a" text-anchor="middle">Female</text>
  <text x="380" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#70658a" text-anchor="middle">Gender ratio</text>
  <line x1="460" y1="16" x2="460" y2="70" stroke="#5456f3" stroke-width="1" opacity="0.15"/>
  <!-- Stat 4 -->
  <text x="540" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#42346e" text-anchor="middle">17</text>
  <text x="540" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#70658a" text-anchor="middle">Analysable</text>
  <text x="540" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#70658a" text-anchor="middle">Meet thresholds</text>
  <line x1="620" y1="16" x2="620" y2="70" stroke="#5456f3" stroke-width="1" opacity="0.15"/>
  <!-- Stat 5 -->
  <text x="710" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#42346e" text-anchor="middle">7</text>
  <text x="710" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#70658a" text-anchor="middle">Modules</text>
  <text x="710" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#70658a" text-anchor="middle">Deliverable scope</text>
</svg>
