<!--
  curing_decision_flow.svg - 6-level curing priority chain
  Shows: vertical decision flowchart with YES (cure) and NO (next check) branches
  Theme: Stellars-Tech derived - accent-1=#0096d1 pipeline, accent-2=#da8230 agents
  Card shape: flat top, rounded bottom r=3 (per theme_swatch.svg)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .semantic-merge { fill: #1a7a5a; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .semantic-merge { fill: #4cb8a0; }
    }
  </style>

  <!-- Title -->
  <text x="400" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">CURING DECISION FLOW (PRIORITY ORDER)</text>

  <!-- === Decision nodes: x=60, w=340, stride=76 (h=58, gap=18) === -->
  <!-- CURE outcome column: x=530..680 -->
  <!-- "CURE" target card -->
  <g id="cure-target">
    <path d="M580,206 H720 V257 Q720,260 717,260 H583 Q580,260 580,257 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M580,206 H720 V257 Q720,260 717,260 H583 Q580,260 580,257 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="580" y="206" width="140" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="650" y="232" class="semantic-merge" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">CURE</text>
    <text x="650" y="252" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">Freeze ontology, flush to Neo4j</text>
  </g>

  <!-- Node 1: Force Cure (accent-2) y=32 -->
  <g id="node-force">
    <path d="M60,32 H400 V87 Q400,90 397,90 H63 Q60,90 60,87 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M60,32 H400 V87 Q400,90 397,90 H63 Q60,90 60,87 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="60" y="32" width="340" height="5" fill="#da8230" opacity="0.6"/>
    <text x="78" y="52" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">1</text>
    <text x="94" y="52" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Force Cure</text>
    <text x="78" y="68" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">force_cure=True in config</text>
    <text x="78" y="82" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">User override - bypasses all checks</text>
  </g>
  <!-- YES: tap to manifold bus -->
  <line x1="400" y1="60" x2="480" y2="60" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="420" y="56" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">YES</text>
  <!-- NO arrow down -->
  <line x1="230" y1="90" x2="230" y2="108" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
  <polygon points="227,104 230,108 233,104" fill="#da8230" opacity="0.6"/>
  <text x="240" y="102" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">NO</text>

  <!-- Node 2: Generative LLM (accent-1) y=108 -->
  <g id="node-generative">
    <path d="M60,108 H400 V163 Q400,166 397,166 H63 Q60,166 60,163 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M60,108 H400 V163 Q400,166 397,166 H63 Q60,166 60,163 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="60" y="108" width="340" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="78" y="128" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">2</text>
    <text x="94" y="128" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Generative LLM</text>
    <text x="78" y="144" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">LLM evaluates metrics timeline + type list</text>
    <text x="78" y="158" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">Returns CureDecision - opt-in (generative_curing=true)</text>
  </g>
  <!-- YES: tap to manifold bus -->
  <line x1="400" y1="136" x2="480" y2="136" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="420" y="132" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">YES</text>
  <!-- NO arrow down -->
  <line x1="230" y1="166" x2="230" y2="184" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
  <polygon points="227,180 230,184 233,180" fill="#da8230" opacity="0.6"/>
  <text x="240" y="178" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">NO</text>

  <!-- Node 3: Patience (accent-2) y=184 -->
  <g id="node-patience">
    <path d="M60,184 H400 V239 Q400,242 397,242 H63 Q60,242 60,239 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M60,184 H400 V239 Q400,242 397,242 H63 Q60,242 60,239 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="60" y="184" width="340" height="5" fill="#da8230" opacity="0.6"/>
    <text x="78" y="204" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">3</text>
    <text x="94" y="204" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Patience (Early Stop)</text>
    <text x="78" y="220" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">N consecutive LLM cure votes (generative_patience)</text>
    <text x="78" y="234" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">0.4 * max_fluid_documents = 8 docs, min 3</text>
  </g>
  <!-- YES: tap to manifold bus -->
  <line x1="400" y1="212" x2="480" y2="212" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="420" y="208" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">YES</text>
  <!-- NO arrow down -->
  <line x1="230" y1="242" x2="230" y2="260" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
  <polygon points="227,256 230,260 233,256" fill="#da8230" opacity="0.6"/>
  <text x="240" y="254" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">NO</text>

  <!-- Node 4: Convergence (accent-1) y=260 -->
  <g id="node-convergence">
    <path d="M60,260 H400 V315 Q400,318 397,318 H63 Q60,318 60,315 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M60,260 H400 V315 Q400,318 397,318 H63 Q60,318 60,315 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="60" y="260" width="340" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="78" y="280" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">4</text>
    <text x="94" y="280" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Convergence</text>
    <text x="78" y="296" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">JSD &lt; 0.01 + entropy delta &lt; 0.05 for stability_window</text>
    <text x="78" y="310" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">Metric-based convergence (is_converged)</text>
  </g>
  <!-- YES: tap to manifold bus -->
  <line x1="400" y1="288" x2="480" y2="288" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="420" y="284" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">YES</text>
  <!-- NO arrow down -->
  <line x1="230" y1="318" x2="230" y2="336" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
  <polygon points="227,332 230,336 233,332" fill="#da8230" opacity="0.6"/>
  <text x="240" y="330" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">NO</text>

  <!-- Node 5: Plateau (accent-1) y=336 -->
  <g id="node-plateau">
    <path d="M60,336 H400 V391 Q400,394 397,394 H63 Q60,394 60,391 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M60,336 H400 V391 Q400,394 397,394 H63 Q60,394 60,391 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="60" y="336" width="340" height="5" fill="#0096d1" opacity="0.6"/>
    <text x="78" y="356" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">5</text>
    <text x="94" y="356" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Plateau</text>
    <text x="78" y="372" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">3+ consecutive stable rounds (entropy delta &lt; 0.1)</text>
    <text x="78" y="386" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">Looser threshold than convergence (is_plateau)</text>
  </g>
  <!-- YES: tap to manifold bus -->
  <line x1="400" y1="364" x2="480" y2="364" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="420" y="360" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">YES</text>
  <!-- NO arrow down -->
  <line x1="230" y1="394" x2="230" y2="412" stroke="#da8230" stroke-width="1.2" opacity="0.5"/>
  <polygon points="227,408 230,412 233,408" fill="#da8230" opacity="0.6"/>
  <text x="240" y="406" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">NO</text>

  <!-- Node 6: Safety Net (accent-2) y=412 -->
  <g id="node-safety">
    <path d="M60,412 H400 V467 Q400,470 397,470 H63 Q60,470 60,467 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M60,412 H400 V467 Q400,470 397,470 H63 Q60,470 60,467 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="60" y="412" width="340" height="5" fill="#da8230" opacity="0.6"/>
    <text x="78" y="432" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">6</text>
    <text x="94" y="432" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">Safety Net</text>
    <text x="78" y="448" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">max_fluid_documents hard cap (default 20)</text>
    <text x="78" y="462" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">ALWAYS cures - overrides LLM, metrics, everything</text>
  </g>
  <!-- ALWAYS: tap to manifold bus -->
  <line x1="400" y1="440" x2="480" y2="440" stroke="#0096d1" stroke-width="2" opacity="0.5"/>
  <text x="412" y="436" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">ALWAYS</text>

  <!-- Manifold bus: vertical trunk connecting all YES taps to CURE -->
  <line x1="480" y1="60" x2="480" y2="440" stroke="#0096d1" stroke-width="2.5" opacity="0.5"/>
  <!-- Bus to CURE: horizontal arrow -->
  <line x1="480" y1="233" x2="574" y2="233" stroke="#0096d1" stroke-width="2.5" opacity="0.5"/>
  <polygon points="574,228 580,233 574,238" fill="#0096d1" opacity="0.7"/>

  <!-- Legend -->
  <g id="legend">
    <line x1="140" y1="500" x2="160" y2="500" stroke="#0096d1" stroke-width="1.5"/>
    <text x="164" y="503" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8">YES - triggers cure</text>
    <line x1="320" y1="500" x2="340" y2="500" stroke="#da8230" stroke-width="1.5"/>
    <text x="344" y="503" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8">NO - fall through to next check</text>
    <rect x="520" y="496" width="8" height="8" rx="1" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1"/>
    <text x="532" y="503" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8">Metric-based</text>
    <rect x="620" y="496" width="8" height="8" rx="1" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="1"/>
    <text x="632" y="503" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="8">Agent / override</text>
  </g>

</svg>
