<!--
  04_svg_infographics_workflow.svg - svg-infographics plugin banner for README
  Shows: left title block + right visual with 6-phase workflow (numbered circles)
  and 8 shipped tool badges grouped into validators and calculators.
  Intent: communicate "structured workflow + automated checkers, not just raw generation".
  Theme: Stellars-Tech (teal primary).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .stroke-1 { stroke: #005f7a; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .stroke-1 { stroke: #5cc8e0; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox 900x200, margin 20
    Left title:   x=20..238
    Divider:      x=250
    Right zone:   x=260..880
      Phase circle row: centers at x=290,346,402,458,514,570 ; cy=78 ; r=20
      Phase labels:     y=120
      Tool badges:      y=148..170 (8 badges 70 wide, gap 4)
  === -->

  <!-- === LEFT TITLE ZONE === -->
  <text x="20" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" class="fg-1">svg-infographics</text>
  <text x="20" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="fg-3">Grid-first SVG infographics</text>

  <rect x="20" y="86" width="60" height="14" rx="2" fill="#005f7a" fill-opacity="0.08"/>
  <text x="50" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">8 TOOLS</text>
  <rect x="86" y="86" width="74" height="14" rx="2" fill="#005f7a" fill-opacity="0.08"/>
  <text x="123" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">DARK MODE</text>
  <rect x="166" y="86" width="60" height="14" rx="2" fill="#005f7a" fill-opacity="0.08"/>
  <text x="196" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">WCAG AA</text>

  <text x="20" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-4">6-phase workflow with</text>
  <text x="20" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-4">automated validation</text>
  <text x="20" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-4">and 60+ examples</text>

  <text x="20" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-2" letter-spacing="1">/SVG-INFOGRAPHICS:CREATE</text>

  <line x1="250" y1="35" x2="250" y2="180" class="stroke-1" stroke-width="0.5" opacity="0.25"/>

  <!-- === RIGHT ZONE === -->
  <text x="260" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-1" letter-spacing="1.5">6-PHASE WORKFLOW</text>

  <!-- 6 phase circles - centers x=290,346,402,458,514,570 ; cy=78 ; r=20 -->
  <!-- Phase 1 -->
  <circle cx="290" cy="78" r="20" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="1"/>
  <text x="290" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">01</text>
  <text x="290" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">RES</text>

  <!-- Phase 2 -->
  <circle cx="346" cy="78" r="20" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="1"/>
  <text x="346" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">02</text>
  <text x="346" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">GRID</text>

  <!-- Phase 3 -->
  <circle cx="402" cy="78" r="20" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="1"/>
  <text x="402" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">03</text>
  <text x="402" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">SCAF</text>

  <!-- Phase 4 -->
  <circle cx="458" cy="78" r="20" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="1"/>
  <text x="458" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">04</text>
  <text x="458" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">CONT</text>

  <!-- Phase 5 -->
  <circle cx="514" cy="78" r="20" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="1"/>
  <text x="514" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-1" text-anchor="middle">05</text>
  <text x="514" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">FIN</text>

  <!-- Phase 6 (validation - gold accent) -->
  <circle cx="570" cy="78" r="20" fill="#7a4a15" fill-opacity="0.12" stroke="#7a4a15" stroke-width="1"/>
  <text x="570" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-2" text-anchor="middle">06</text>
  <text x="570" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="fg-1" text-anchor="middle">VALD</text>

  <!-- Connector chevrons between circles (small triangles, no track-line) -->
  <polygon points="318,75 322,78 318,81" fill="#005f7a" opacity="0.45"/>
  <polygon points="374,75 378,78 374,81" fill="#005f7a" opacity="0.45"/>
  <polygon points="430,75 434,78 430,81" fill="#005f7a" opacity="0.45"/>
  <polygon points="486,75 490,78 486,81" fill="#005f7a" opacity="0.45"/>
  <polygon points="542,75 546,78 542,81" fill="#005f7a" opacity="0.45"/>

  <!-- Phase labels below circles -->
  <text x="290" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">research</text>
  <text x="346" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">grid</text>
  <text x="402" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">scaffold</text>
  <text x="458" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">content</text>
  <text x="514" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3" text-anchor="middle">finishing</text>
  <text x="570" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="accent-2" text-anchor="middle">validation</text>

  <!-- Right info block (stats) -->
  <text x="620" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-1" letter-spacing="1.5">SHIPPED</text>
  <text x="620" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" class="fg-1">8</text>
  <text x="650" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">tools</text>
  <text x="620" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" class="fg-1">60+</text>
  <text x="660" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">examples</text>
  <text x="620" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">grid-first  -  CSS classes  -  validated</text>

  <!-- === TOOL BADGES === -->
  <text x="260" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-1" letter-spacing="1.5">SVG-INFOGRAPHICS CLI</text>

  <!-- 8 badges, 4 validators teal + 4 calculators darker, w=72 h=18 gap=4 -->
  <!-- Row of 8: x=260, 336, 412, 488, 564, 640, 716, 792 -->
  <!-- Validators (teal) -->
  <rect x="260" y="152" width="72" height="18" rx="2" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="0.6"/>
  <text x="296" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">overlaps</text>
  <rect x="336" y="152" width="72" height="18" rx="2" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="0.6"/>
  <text x="372" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">contrast</text>
  <rect x="412" y="152" width="72" height="18" rx="2" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="0.6"/>
  <text x="448" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">alignment</text>
  <rect x="488" y="152" width="72" height="18" rx="2" fill="#005f7a" fill-opacity="0.10" class="stroke-1" stroke-width="0.6"/>
  <text x="524" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">css</text>
  <!-- Calculators (gold) -->
  <rect x="564" y="152" width="72" height="18" rx="2" fill="#7a4a15" fill-opacity="0.10" stroke="#7a4a15" stroke-width="0.6"/>
  <text x="600" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">primitives</text>
  <rect x="640" y="152" width="72" height="18" rx="2" fill="#7a4a15" fill-opacity="0.10" stroke="#7a4a15" stroke-width="0.6"/>
  <text x="676" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">connector</text>
  <rect x="716" y="152" width="72" height="18" rx="2" fill="#7a4a15" fill-opacity="0.10" stroke="#7a4a15" stroke-width="0.6"/>
  <text x="752" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">geom</text>
  <rect x="792" y="152" width="72" height="18" rx="2" fill="#7a4a15" fill-opacity="0.10" stroke="#7a4a15" stroke-width="0.6"/>
  <text x="828" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" class="fg-2" text-anchor="middle">text-to-path</text>

  <!-- Bottom legend -->
  <rect x="260" y="180" width="6" height="6" fill="#005f7a" fill-opacity="0.5"/>
  <text x="270" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">validators</text>
  <rect x="320" y="180" width="6" height="6" fill="#7a4a15" fill-opacity="0.5"/>
  <text x="330" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">calculators</text>
</svg>
